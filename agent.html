<style>/* ═══════════════════════════════════════════════════
   유정 워크스페이스 — Design tokens
   ═══════════════════════════════════════════════════ */
:root{
  --bg:#f5f4f0;
  --sb-bg:#f0efe9;
  --surface:#ffffff;
  --surface-2:#fafaf7;
  --surface-3:#f0efe9;
  --ink:#111110;
  --ink-2:#3d3d3a;
  --ink-3:#6b6b67;
  --ink-4:#b4b2a9;
  --border:#e8e6e0;
  --border-strong:#dad7cd;
  --accent:#111110;
  --ok-bg:#e7f0e9;  --ok-fg:#2d6a4f;
  --warn-bg:#faf0d6; --warn-fg:#8a5a00;
  --info-bg:#e6ecf6; --info-fg:#1e3a5f;
  --pink-bg:#f6e1e4; --pink-fg:#8a3a45;
  --neutral-bg:#ecebe5; --neutral-fg:#6b6b67;
  --r-card:16px; --r-md:10px; --r-sm:8px; --r-pill:999px;
  --shadow-card:0 1px 2px rgba(17,17,16,.04), 0 1px 1px rgba(17,17,16,.02);
  --shadow-pop:0 24px 64px -16px rgba(17,17,16,.22), 0 4px 12px rgba(17,17,16,.06);
  --shadow-hover:0 8px 24px -10px rgba(17,17,16,.12);
  --t-fast:.12s ease;
  --t-norm:.18s cubic-bezier(.2,.6,.2,1);
  --t-slow:.32s cubic-bezier(.2,.6,.2,1);
  --sb-w:248px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--ink); font-size:14px; line-height:1.55;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  font-feature-settings:"ss01","cv11";
  display:grid;
  grid-template-columns:var(--sb-w) 1fr;
  min-height:100vh;
}
body.sb-collapsed{grid-template-columns:0 1fr}
body.sb-collapsed .sidebar{display:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::selection{background:var(--ink);color:#fff}
a{color:inherit;text-decoration:none}

.ico14{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ico16{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{
  position:sticky; top:0;
  height:100vh;
  align-self:start;
  background:var(--sb-bg);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border-strong) transparent;
}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.ws-header{
  padding:14px 12px 10px; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid transparent;
}
.ws-avatar{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(140deg,#1a1a18,#2c2c29); color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(17,17,16,.18), inset 0 1px 0 rgba(255,255,255,.08);
}
.ws-info{flex:1;min-width:0}
.ws-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-email{font-size:10.5px;color:var(--ink-3);margin-top:1px}
.sb-icobtn{
  width:26px;height:26px;border-radius:6px;border:none;background:transparent;
  color:var(--ink-3);display:flex;align-items:center;justify-content:center;
  transition:background var(--t-fast),color var(--t-fast);
}
.sb-icobtn:hover{background:rgba(17,17,16,.06);color:var(--ink)}
.sb-icobtn:disabled{opacity:.4;cursor:not-allowed}

.sb-search{
  margin:6px 10px 12px; padding:6px 10px;
  background:rgba(17,17,16,.04);
  border-radius:7px;
  display:flex; align-items:center; gap:8px;
  color:var(--ink-3);
  transition:background var(--t-fast);
}
.sb-search:hover{background:rgba(17,17,16,.07)}
.sb-search input{
  flex:1; border:none; outline:none; background:transparent;
  font-size:12.5px; color:var(--ink); min-width:0;
}
.sb-search kbd{
  font-family:inherit; font-size:10px; font-weight:500;
  color:var(--ink-4); padding:1px 5px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:4px;
}

.sb-nav{
  padding:0 8px 6px; display:flex; flex-direction:column; gap:1px;
}
.sb-item{
  display:flex; align-items:center; gap:9px;
  padding:6px 10px; border-radius:6px;
  font-size:13px; color:var(--ink-2);
  cursor:pointer; transition:background var(--t-fast),color var(--t-fast);
  border:none; background:transparent; text-align:left; width:100%;
  font-weight:500;
}
.sb-item:hover{background:rgba(17,17,16,.06)}
.sb-item.active{background:rgba(17,17,16,.10);color:var(--ink)}
.sb-item-emoji{font-size:14px;width:18px;text-align:center;flex-shrink:0;line-height:1}
.sb-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.005em}
.sb-item-cnt{
  font-size:10.5px;font-weight:500;color:var(--ink-4);
  padding:1px 6px; border-radius:var(--r-pill);
  background:rgba(17,17,16,.04);
  letter-spacing:.02em; flex-shrink:0;
}
.sb-item.active .sb-item-cnt{background:rgba(17,17,16,.08);color:var(--ink-3)}

.sb-section{margin-top:14px;padding:0 8px}
.sb-section-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 10px;
  font-size:10.5px; font-weight:600; color:var(--ink-4);
  letter-spacing:.06em; text-transform:uppercase;
}
.sb-secondary{display:flex;flex-direction:column;gap:1px;margin-top:2px}
.sb-mini{
  display:flex;align-items:center;gap:9px;
  padding:5px 10px;border-radius:6px;
  font-size:12.5px;color:var(--ink-2); cursor:pointer;
  transition:background var(--t-fast);
}
.sb-mini:hover{background:rgba(17,17,16,.06)}
.sb-mini-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.sb-foot{
  margin-top:auto; padding:8px;
  border-top:1px solid var(--border);
  display:flex; flex-direction:column; gap:1px;
}
.sb-foot-btn{
  display:flex; align-items:center; gap:10px;
  padding:6px 10px; border-radius:6px;
  font-size:12px; color:var(--ink-3);
  border:none; background:transparent; cursor:pointer;
  transition:background var(--t-fast),color var(--t-fast);
}
.sb-foot-btn:hover{background:rgba(17,17,16,.06);color:var(--ink-2)}

/* ── Main ────────────────────────────────────────────── */
.main{min-width:0;display:flex;flex-direction:column}
.crumb{
  height:46px; padding:0 28px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(245,244,240,.85);
  backdrop-filter:saturate(180%) blur(12px);
  -webkit-backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:20;
}
.crumb-left{display:flex;align-items:center;gap:10px}
.crumb-toggle{
  width:28px;height:28px;border-radius:6px;border:none;background:transparent;
  color:var(--ink-3);display:flex;align-items:center;justify-content:center;
  transition:background var(--t-fast),color var(--t-fast);
}
.crumb-toggle:hover{background:rgba(17,17,16,.06);color:var(--ink)}
.crumb-trail{font-size:13px;font-weight:500;color:var(--ink-2);letter-spacing:-.005em}
.crumb-trail .sep{color:var(--ink-4);margin:0 6px;font-weight:400}
.crumb-trail .here{color:var(--ink);font-weight:600}
.crumb-right{display:flex;align-items:center;gap:10px}
.crumb-meta{font-size:11px;color:var(--ink-3)}

.view-host{padding:0;min-height:0;flex:1}
.view{
  max-width:980px; margin:0 auto;
  padding:36px 40px 80px;
  display:flex; flex-direction:column; gap:18px;
}
.view[hidden]{display:none}
.view-ux{max-width:1200px;padding:24px 28px 80px}
.view-budget{max-width:1200px}

/* ── Page head (Notion-style) ────────────────────────── */
.page-head{padding:8px 0 14px}
.page-emoji{font-size:48px;line-height:1;margin-bottom:14px}
.page-title{
  font-size:36px;font-weight:700;color:var(--ink);
  line-height:1.15;letter-spacing:-.025em;
}
.page-sub{font-size:14px;color:var(--ink-3);margin-top:8px;line-height:1.55}

/* ── Card system ─────────────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-card);
  overflow:hidden;
  box-shadow:var(--shadow-card);
}
.card-head{
  padding:16px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.card-head-left{display:flex;align-items:center;gap:11px;min-width:0}
.card-mark{
  width:30px;height:30px;border-radius:9px;
  background:var(--surface-3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.card-title{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.005em}
.card-sub{font-size:11px;color:var(--ink-3);margin-top:2px}
.card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* ── Buttons ─────────────────────────────────────────── */
.btn{
  font-size:13px;font-weight:500;
  padding:8px 14px;border-radius:var(--r-sm);
  border:1px solid var(--border); background:var(--surface);
  color:var(--ink-2); cursor:pointer;
  transition:transform var(--t-fast), background var(--t-fast), border-color var(--t-fast), box-shadow var(--t-fast), color var(--t-fast);
  display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 1px 0 rgba(17,17,16,.02);
  line-height:1;
}
.btn:hover{background:var(--surface-2); border-color:var(--border-strong); color:var(--ink)}
.btn:active{transform:translateY(.5px)}
.btn-dark{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 1px 2px rgba(17,17,16,.18), inset 0 1px 0 rgba(255,255,255,.06)}
.btn-dark:hover{background:#1d1d1b;border-color:#1d1d1b;color:#fff}
.btn:disabled,.btn-dark:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-sm{font-size:12px;padding:5px 10px;border-radius:7px;gap:5px}

/* ── Inputs ──────────────────────────────────────────── */
.ipt{
  flex:1; padding:9px 11px;
  border:1px solid var(--border); border-radius:var(--r-sm);
  font-size:13px; color:var(--ink); background:var(--surface);
  outline:none; min-width:0;
  transition:border-color var(--t-fast), box-shadow var(--t-fast);
}
.ipt:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(17,17,16,.06)}
textarea.ipt{resize:vertical;font-family:inherit;line-height:1.55}
select.ipt{cursor:pointer}

/* ══════════════════════════════════════════════════════
   HOME
   ══════════════════════════════════════════════════════ */
.home-stats{
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
}
.hstat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 18px 16px;
  cursor:pointer;
  transition:transform var(--t-norm), box-shadow var(--t-norm), border-color var(--t-norm);
  box-shadow:var(--shadow-card);
  position:relative; overflow:hidden;
}
.hstat:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
.hstat-lbl{font-size:10.5px;font-weight:600;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
.hstat-num{font-size:32px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.025em;font-variant-numeric:tabular-nums;display:inline-block}
.hstat-foot{display:inline-block;font-size:13px;color:var(--ink-3);margin-left:6px;font-weight:500}

.home-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.widget{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-card);
  overflow:hidden;
  box-shadow:var(--shadow-card);
  display:flex; flex-direction:column;
  transition:box-shadow var(--t-norm),border-color var(--t-norm);
}
.widget:hover{border-color:var(--border-strong);box-shadow:var(--shadow-hover)}
.widget-span2{grid-column:span 2}
.widget-head{
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.widget-title{display:flex;align-items:center;gap:9px}
.widget-emoji{
  width:28px;height:28px;border-radius:8px;
  background:var(--surface-3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.widget-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.005em}
.widget-go{
  font-size:11px;font-weight:500;color:var(--ink-3);
  padding:3px 9px;border-radius:var(--r-pill);
  border:1px solid var(--border); background:var(--surface);
  transition:all var(--t-fast);
}
.widget-go:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.widget-body{padding:14px 18px 16px;flex:1;min-height:0}
.widget-empty{
  padding:24px 18px; text-align:center;
  font-size:12px; color:var(--ink-4);
}

/* widget rows */
.wrow{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;
  border-bottom:1px dashed var(--border);
}
.wrow:last-child{border-bottom:none}
.wrow-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.7),0 0 0 3px rgba(17,17,16,.04)}
.wrow-title{flex:1;font-size:12.5px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wrow-meta{font-size:11px;color:var(--ink-3);flex-shrink:0}
.wrow-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-pill);background:var(--neutral-bg);color:var(--neutral-fg);flex-shrink:0}

/* diary widget special */
.w-diary-recent{
  padding:14px 16px; border-radius:11px;
  background:var(--surface-2);
  border:1px solid var(--border);
}
.w-diary-recent-date{font-size:10.5px;color:var(--ink-4);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.w-diary-recent-txt{
  font-size:13px; color:var(--ink-2); line-height:1.55;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}

/* budget mini chart */
.w-budget-num{display:flex;align-items:baseline;gap:6px;margin-bottom:12px}
.w-budget-amt{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.w-budget-unit{font-size:13px;color:var(--ink-3);font-weight:500}
.w-budget-bar{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;display:flex}
.w-budget-bar > span{display:block;height:100%}

/* bucket progress widget */
.w-bk-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--border)}
.w-bk-row:last-child{border-bottom:none}
.w-bk-check{
  width:16px;height:16px;border-radius:5px;border:1.5px solid var(--ink-4);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;
}
.w-bk-check.done{background:var(--ink);border-color:var(--ink);color:#fff}
.w-bk-name{flex:1;font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w-bk-name.done{color:var(--ink-4);text-decoration:line-through}
.w-bk-cat{font-size:11px;flex-shrink:0}

/* ux widget */
.w-ux-stat{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.w-ux-stat-cell{
  padding:10px 12px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface-2);
}
.w-ux-stat-num{font-size:20px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.w-ux-stat-lbl{font-size:10.5px;color:var(--ink-3);margin-top:5px;font-weight:500;letter-spacing:.02em}

/* quick actions widget */
.w-quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.w-quick{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:11px;
  cursor:pointer; text-align:left; width:100%;
  transition:all var(--t-fast);
  font-family:inherit;
}
.w-quick:hover{background:var(--surface);border-color:var(--border-strong);transform:translateY(-1px)}
.w-quick-emoji{font-size:18px;flex-shrink:0}
.w-quick-lbl{font-size:12.5px;font-weight:600;color:var(--ink);letter-spacing:-.005em}
.w-quick-sub{font-size:10.5px;color:var(--ink-3);margin-top:1px}

/* ══════════════════════════════════════════════════════
   BUDGET
   ══════════════════════════════════════════════════════ */
.budget-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.bsum{
  padding:18px 20px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
  box-shadow:var(--shadow-card);
}
.bsum-lbl{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.bsum-num{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.bsum-in .bsum-num{color:#2d6a4f}
.bsum-out .bsum-num{color:#8a3a45}

/* 2-person tabs */
.ppl-tabs-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ppl-tabs{
  display:flex; gap:6px;
  padding:6px; border:1px solid var(--border);
  border-radius:12px; background:var(--surface);
  width:fit-content;
  box-shadow:var(--shadow-card);
}
.ppl-tab{
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 14px; border-radius:8px;
  font-size:12.5px; font-weight:500; color:var(--ink-3);
  border:none; background:transparent; cursor:pointer;
  transition:all var(--t-fast); font-family:inherit;
  white-space:nowrap;
}
.ppl-tab:hover{color:var(--ink);background:var(--surface-2)}
.ppl-tab.on{background:var(--ink);color:#fff;box-shadow:0 2px 6px rgba(17,17,16,.18)}
.ppl-tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ppl-tab-name{cursor:text}
.ppl-tab-name[contenteditable="true"]{outline:none;background:rgba(255,255,255,.18);padding:0 4px;border-radius:4px}

/* per-person cards */
.ppl-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ppl-card{
  padding:18px 20px; border-radius:14px;
  background:var(--surface); border:1px solid var(--border);
  box-shadow:var(--shadow-card);
  position:relative; overflow:hidden;
}
.ppl-card::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:4px;
  background:var(--p-color, var(--ink));
}
.ppl-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ppl-card-name{
  display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.01em;
}
.ppl-card-share{font-size:10.5px;font-weight:600;color:var(--ink-3);letter-spacing:.04em}
.ppl-card-rows{display:flex;flex-direction:column;gap:8px}
.ppl-card-row{display:flex;justify-content:space-between;align-items:baseline}
.ppl-card-row-lbl{font-size:11px;color:var(--ink-3);font-weight:500}
.ppl-card-row-num{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.ppl-card-row-num.in{color:#2d6a4f}
.ppl-card-row-num.out{color:#8a3a45}
.ppl-card-bar{
  margin-top:14px; height:6px; background:var(--surface-3);
  border-radius:3px; overflow:hidden;
}
.ppl-card-bar > span{display:block;height:100%;border-radius:3px}

/* edit modal fields */
.ppl-edit-field{
  display:flex;flex-direction:column;gap:10px;
  padding:16px;border:1px solid var(--border);border-radius:12px;
  background:var(--surface-2);
}
.ppl-edit-field-head{font-size:10.5px;font-weight:600;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase}
.ppl-edit-name{
  font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);
  padding:10px 12px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface);outline:none;letter-spacing:-.01em;
  transition:border-color var(--t-fast),box-shadow var(--t-fast);
}
.ppl-edit-name:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(17,17,16,.06)}
.ppl-edit-swatches{display:flex;gap:8px;flex-wrap:wrap}
.ppl-edit-swatch{
  width:30px;height:30px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;
  transition:transform var(--t-fast);
}
.ppl-edit-swatch:hover{transform:scale(1.08)}
.ppl-edit-swatch.on{border-color:var(--ink);box-shadow:0 0 0 3px rgba(17,17,16,.08), 0 4px 10px rgba(17,17,16,.18)}

/* person picker (inside form) */
.ppl-picker{display:flex;gap:4px;flex-shrink:0}
.ppl-picker button{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px; border-radius:var(--r-sm);
  font-size:12.5px;font-weight:500;color:var(--ink-3);
  border:1px solid var(--border); background:var(--surface);
  cursor:pointer; transition:all var(--t-fast); font-family:inherit;
}
.ppl-picker button:hover{color:var(--ink);border-color:var(--border-strong)}
.ppl-picker button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.ppl-picker button > .ppl-tab-dot{width:7px;height:7px}
.ppl-picker button.on > .ppl-tab-dot{background:#fff !important}

/* list shows person tag */
.bg-row-ppl{
  font-size:10.5px;font-weight:600;
  padding:3px 8px;border-radius:var(--r-pill);
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface-3);color:var(--ink-2);
  justify-self:start;
}
.bg-row-ppl-dot{width:6px;height:6px;border-radius:50%}

/* ── Spending table ──────────────────────────────────── */
.bg-year{
  font-size:13px; font-weight:600; color:var(--ink);
  padding:0 10px; letter-spacing:-.005em;
  min-width:64px; text-align:center;
}
.bg-tbl-wrap{
  overflow-x:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border-strong) transparent;
}
.bg-tbl-wrap::-webkit-scrollbar{height:8px}
.bg-tbl-wrap::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.bg-tbl{
  border-collapse:separate; border-spacing:0;
  width:100%; min-width:1280px;
  font-size:12.5px;
  font-variant-numeric:tabular-nums;
}
.bg-tbl th, .bg-tbl td{
  padding:9px 12px;
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  background:var(--surface);
  text-align:right;
  white-space:nowrap;
  position:relative;
  height:38px;
}
.bg-tbl thead th{
  background:var(--surface-2);
  font-size:10.5px; font-weight:600; color:var(--ink-3);
  letter-spacing:.04em; text-transform:uppercase;
  text-align:center;
  position:sticky; top:0; z-index:2;
}
.bg-tbl thead th.col-label{text-align:left;letter-spacing:0;text-transform:none;font-size:11px;font-weight:600;color:var(--ink-2)}
/* sticky first column (labels) */
.bg-tbl th.col-label, .bg-tbl td.col-label{
  position:sticky; left:0; z-index:1;
  background:var(--surface);
  text-align:left;
  border-right:2px solid var(--border);
  min-width:240px; max-width:240px;
}
.bg-tbl thead th.col-label{z-index:3;background:var(--surface-2)}

/* section header row */
.bg-tbl-sec td{
  background:var(--surface-3) !important;
  font-weight:700; font-size:12px;
  color:var(--ink-2); letter-spacing:-.005em;
  text-align:left;
  padding:8px 12px;
}
.bg-tbl-sec td.col-label{background:var(--surface-3) !important}

/* item rows */
.bg-tbl-item:hover td{background:var(--surface-2)}
.bg-tbl-item:hover td.col-label{background:var(--surface-2)}
.bg-tbl-item td.col-label{
  font-weight:500;color:var(--ink);
  letter-spacing:-.005em;
}

/* ratio cell */
.bg-tbl-ratio{
  color:var(--ink-3);
  text-align:center;
  font-weight:500;
  width:64px; min-width:64px;
}
.bg-tbl-ratio.editable{cursor:cell}
.bg-tbl-ratio.editable:hover{color:var(--ink);background:var(--surface-2)}

/* amount cell */
.bg-tbl-amt{
  width:92px; min-width:92px;
  font-weight:500;
  color:var(--ink);
  cursor:cell;
}
.bg-tbl-amt.empty{color:var(--ink-4);font-weight:400}
.bg-tbl-amt.locked{cursor:not-allowed;background:var(--surface-2);color:var(--ink-3)}
.bg-tbl-amt:not(.locked):hover{background:var(--surface-2);box-shadow:inset 0 0 0 1px var(--ink-4)}
.bg-tbl-amt.this-month{background:rgba(217,119,6,.04)}
.bg-tbl-amt.editing{background:var(--surface);box-shadow:inset 0 0 0 2px var(--ink) !important;padding:0}
.bg-tbl-amt input, .bg-tbl-ratio input{
  width:100%; height:100%;
  border:none; outline:none; background:transparent;
  font:inherit; color:inherit;
  text-align:right;
  padding:9px 12px;
  font-variant-numeric:tabular-nums;
}
.bg-tbl-ratio.editing input{text-align:center}

/* total row */
.bg-tbl-total td{
  background:var(--surface-2) !important;
  font-weight:700; color:var(--ink);
  border-top:2px solid var(--ink);
  font-size:13px;
}
.bg-tbl-total td.col-label{
  background:var(--surface-2) !important;
  text-align:left; font-weight:700;
}
.bg-tbl-total td.bg-tbl-ratio{color:var(--ink)}

/* this-month column header highlight */
.bg-tbl thead th.this-month{color:var(--ink);background:rgba(217,119,6,.08)}

/* ── label / section edit affordances ────────────────── */
.cat-label-cell{display:flex;align-items:center;gap:6px;width:100%;min-width:0}
.cat-label-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-label-actions{display:flex;gap:2px;opacity:0;transition:opacity var(--t-fast);flex-shrink:0}
.bg-tbl-item:hover .cat-label-actions{opacity:1}

.sec-label-cell{display:flex;align-items:center;gap:10px;width:100%;min-width:0}
.sec-label-text{flex:0 0 auto;font-weight:700;letter-spacing:-.005em}
.sec-label-actions{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity var(--t-fast);flex-shrink:0}
.bg-tbl-sec:hover .sec-label-actions{opacity:1}

.cat-act-btn{
  width:24px;height:24px;border-radius:6px;
  border:none;background:transparent;
  color:var(--ink-3);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-family:inherit;font-weight:500;
  padding:0 6px; gap:3px;
  transition:all var(--t-fast);
  white-space:nowrap;
}
.cat-act-btn[onclick*="addItem"]{width:auto;padding:0 8px}
.cat-act-btn:hover{background:var(--surface-3);color:var(--ink)}
.cat-act-btn.danger:hover{background:#fef2f2;color:#991b1b}

.cat-label-input, .sec-label-input{
  flex:1; min-width:0;
  border:1px solid var(--ink); outline:none;
  background:var(--surface);
  font:inherit; font-weight:500; color:var(--ink);
  padding:4px 8px; border-radius:6px;
  box-shadow:0 0 0 3px rgba(17,17,16,.06);
}
.sec-label-input{font-weight:700}

/* add section row */
.bg-tbl-add-sec td{
  background:var(--surface) !important;
  border-right:none !important;
  padding:8px 12px;
  text-align:left;
}
.bg-tbl-add-sec td.col-label{
  background:var(--surface) !important;
  border-right:none !important;
}
.btn-add-section{
  font-size:12px; color:var(--ink-3); font-weight:500;
  padding:7px 14px; border-radius:8px;
  border:1px dashed var(--border-strong); background:transparent;
  cursor:pointer; font-family:inherit;
  display:inline-flex; align-items:center; gap:6px;
  transition:all var(--t-fast);
}
.btn-add-section:hover{background:var(--surface-2);color:var(--ink);border-color:var(--ink-4);border-style:solid}

/* ── Investment chart & toggle ───────────────────────── */
.seg{
  display:inline-flex; padding:3px; gap:2px;
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:8px;
}
.seg-btn{
  padding:5px 12px; border-radius:6px;
  font-size:11.5px; font-weight:500; color:var(--ink-3);
  border:none; background:transparent; cursor:pointer;
  font-family:inherit; transition:all var(--t-fast);
}
.seg-btn:hover{color:var(--ink)}
.seg-btn.on{background:var(--ink);color:#fff;box-shadow:0 1px 3px rgba(17,17,16,.18)}

.bg-inv-chart{
  padding:18px 24px 12px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:relative;
  min-height:220px;
}
.bg-inv-empty{
  padding:36px 20px; text-align:center;
  color:var(--ink-4); font-size:12px;
}
.bg-inv-svg{display:block;width:100%;height:240px;overflow:visible}
.bg-inv-grid line{stroke:var(--border);stroke-dasharray:2 3}
.bg-inv-axis text{font-size:10px;fill:var(--ink-4);font-family:'DM Sans',sans-serif;font-weight:500}
.bg-inv-axis text.this-month{fill:var(--ink);font-weight:700}
.bg-inv-area{opacity:.18}
.bg-inv-line{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.bg-inv-dot{stroke:var(--surface);stroke-width:2}
.bg-inv-tt{
  position:absolute;
  pointer-events:none;
  background:var(--ink); color:#fff;
  padding:8px 11px; border-radius:8px;
  font-size:11px; line-height:1.55;
  box-shadow:0 8px 18px -6px rgba(17,17,16,.4);
  transform:translate(-50%, -100%);
  white-space:nowrap;
  opacity:0; transition:opacity var(--t-fast);
  z-index:5;
}
.bg-inv-tt.on{opacity:1}
.bg-inv-tt strong{font-weight:600}
.bg-inv-tt-row{display:flex;align-items:center;gap:6px;justify-content:space-between;gap:18px}
.bg-inv-tt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bg-inv-legend{
  display:flex;flex-wrap:wrap;gap:14px 18px;
  margin-top:8px; padding:8px 0 0;
  border-top:1px dashed var(--border);
}
.bg-inv-leg-item{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-3);font-weight:500}
.bg-inv-leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bg-inv-leg-amt{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}

.bg-form{padding:14px 18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bg-form .ipt{flex:1;min-width:80px}

.bg-chart{padding:18px 20px;display:flex;flex-direction:column;gap:11px}
.bgch-row{display:grid;grid-template-columns:100px 1fr 100px;align-items:center;gap:12px}
.bgch-lbl{font-size:12.5px;color:var(--ink-2);font-weight:500;display:flex;align-items:center;gap:7px}
.bgch-bar{height:8px;background:var(--surface-3);border-radius:4px;overflow:hidden;position:relative}
.bgch-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bgch-amt{font-size:12.5px;color:var(--ink);font-weight:600;text-align:right;font-variant-numeric:tabular-nums}

.bg-list{display:flex;flex-direction:column}
.bg-row{
  display:grid; grid-template-columns:54px 90px 70px 1fr 110px 60px;
  gap:10px; align-items:center;
  padding:11px 18px; border-bottom:1px solid var(--border);
  transition:background var(--t-fast);
}
.bg-row:last-child{border-bottom:none}
.bg-row:hover{background:var(--surface-2)}
.bg-row.editing{background:rgba(217,119,6,.06);box-shadow:inset 3px 0 0 #d97706}
.bg-row-actions{display:flex;gap:2px;justify-content:flex-end}
.row-act-btn{
  width:26px;height:26px;border-radius:6px;
  border:none;background:transparent;
  color:var(--ink-4);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-family:inherit;
  transition:all var(--t-fast);
}
.row-act-btn:hover{background:var(--surface-3);color:var(--ink)}
.row-act-btn.danger:hover{background:#fef2f2;color:#991b1b}
.bg-form-actions{display:flex;gap:6px;flex-shrink:0}
.bg-row-date{font-size:11px;color:var(--ink-4);font-weight:500;font-variant-numeric:tabular-nums}
.bg-row-cat{font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--r-pill);text-align:center;width:fit-content;justify-self:start}
.bg-row-memo{font-size:12.5px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bg-row-amt{font-size:13px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.bg-row-amt.out{color:#8a3a45}
.bg-row-amt.in{color:#2d6a4f}

/* ══════════════════════════════════════════════════════
   DIARY
   ══════════════════════════════════════════════════════ */
.diary-write{padding:20px 22px}
.diary-write-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.diary-date{
  font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.005em;
  display:flex;align-items:center;gap:8px;
}
.diary-date::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink)}
.diary-moods{display:flex;gap:6px}
.diary-mood{
  width:34px;height:34px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  transition:all var(--t-fast);
}
.diary-mood:hover{background:var(--surface-2);transform:translateY(-1px)}
.diary-mood.on{background:var(--ink);border-color:var(--ink);box-shadow:0 4px 10px rgba(17,17,16,.18)}
#diary-input{
  width:100%; border:none; outline:none; resize:vertical;
  font-size:15px; line-height:1.7; color:var(--ink);
  background:transparent; padding:8px 0;
  min-height:140px; font-family:inherit;
}
#diary-input::placeholder{color:var(--ink-4)}
.diary-write-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);
}
.diary-hint{font-size:11px;color:var(--ink-4)}

.diary-list{display:flex;flex-direction:column}
.diary-entry{
  padding:18px 22px; border-bottom:1px solid var(--border);
  transition:background var(--t-fast);
}
.diary-entry:last-child{border-bottom:none}
.diary-entry:hover{background:var(--surface-2)}
.diary-entry-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.diary-entry-date{
  font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:.04em;
  display:flex;align-items:center;gap:8px;
}
.diary-entry-mood{font-size:18px}
.diary-entry-body{font-size:13.5px;color:var(--ink-2);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.diary-entry-del{
  width:24px;height:24px;border-radius:6px;border:none;background:none;
  color:var(--ink-4);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--t-fast);
}
.diary-entry-del:hover{color:#991b1b;background:#fef2f2}

/* ══════════════════════════════════════════════════════
   SCHEDULE
   ══════════════════════════════════════════════════════ */
.schedule-row{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
.schedule-cal .card-head-left{gap:7px}
.cal-wkrow{
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:8px 14px; background:var(--surface-2);
  border-bottom:1px solid var(--border);
}
.cal-wkrow > div{
  font-size:10.5px;font-weight:600;color:var(--ink-3);
  letter-spacing:.06em;text-transform:uppercase;text-align:center;
}
.cal-wkrow > div:first-child{color:#993356}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);padding:1px;border-bottom-left-radius:var(--r-card);border-bottom-right-radius:var(--r-card)}
.cal-cell{
  background:var(--surface); min-height:88px; padding:8px 8px 6px;
  display:flex;flex-direction:column;gap:4px;
  cursor:pointer; transition:background var(--t-fast);
  position:relative;
}
.cal-cell:hover{background:var(--surface-2)}
.cal-cell.muted{background:var(--surface-2)}
.cal-cell.muted .cal-num{color:var(--ink-4)}
.cal-cell.today .cal-num{
  background:var(--ink);color:#fff;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
}
.cal-cell.sel{box-shadow:inset 0 0 0 2px var(--ink)}
.cal-num{font-size:12px;font-weight:600;color:var(--ink-2);line-height:1;font-variant-numeric:tabular-nums;width:fit-content}
.cal-evs{display:flex;flex-direction:column;gap:2px;margin-top:auto}
.cal-ev{
  font-size:10.5px;font-weight:500;
  padding:2px 6px;border-radius:5px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.3;
}
.cal-ev.work{background:var(--info-bg);color:var(--info-fg)}
.cal-ev.personal{background:var(--ok-bg);color:var(--ok-fg)}
.cal-ev.health{background:var(--pink-bg);color:var(--pink-fg)}
.cal-ev.event{background:var(--warn-bg);color:var(--warn-fg)}
.cal-more{font-size:10px;color:var(--ink-4);font-weight:500;padding:1px 5px}

.sch-form{padding:14px 18px;display:flex;flex-direction:column;gap:9px;border-bottom:1px solid var(--border)}
.sch-day-list{display:flex;flex-direction:column;max-height:300px;overflow-y:auto}
.sch-day-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 18px; border-bottom:1px solid var(--border);
  transition:background var(--t-fast);
}
.sch-day-row:last-child{border-bottom:none}
.sch-day-row:hover{background:var(--surface-2)}
.sch-day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sch-day-dot.work{background:#0055cc}
.sch-day-dot.personal{background:#226622}
.sch-day-dot.health{background:#993356}
.sch-day-dot.event{background:#cc9900}
.sch-day-title{flex:1;font-size:12.5px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ══════════════════════════════════════════════════════
   BUCKET
   ══════════════════════════════════════════════════════ */
.bucket-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.bkst{
  padding:18px 20px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
  box-shadow:var(--shadow-card);
  text-align:center;
}
.bkst-num{font-size:32px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.025em;font-variant-numeric:tabular-nums;margin-bottom:8px}
.bkst-lbl{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase}

.bk-form{padding:14px 18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bk-list{display:flex;flex-direction:column}
.bk-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;border-bottom:1px solid var(--border);
  transition:background var(--t-fast);
}
.bk-row:last-child{border-bottom:none}
.bk-row:hover{background:var(--surface-2)}
.bk-check{
  width:22px;height:22px;border-radius:7px;
  border:1.5px solid var(--ink-4);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:transparent;cursor:pointer;
  background:var(--surface);
  transition:all var(--t-fast);
}
.bk-check:hover{border-color:var(--ink-3)}
.bk-check.done{background:var(--ink);border-color:var(--ink);color:#fff}
.bk-text{flex:1;min-width:0}
.bk-title{font-size:13.5px;font-weight:500;color:var(--ink);letter-spacing:-.005em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-title.done{color:var(--ink-4);text-decoration:line-through}
.bk-meta{font-size:11px;color:var(--ink-3);margin-top:2px;display:flex;align-items:center;gap:8px}
.bk-cat-pill{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:var(--r-pill);background:var(--surface-3);color:var(--ink-3)}

/* filter buttons active */
.btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ══════════════════════════════════════════════════════
   UX AGENT (mounted into #ux-mount)
   These are the styles used inside the agent dashboard.
   Mostly inherited; this file already provides .card, .btn, .ipt.
   Specific agent classes live in ux-agent.css (loaded by JS).
   ══════════════════════════════════════════════════════ */
.ux-shell{display:flex;flex-direction:column;gap:0}
.ux-topbar{
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(14px);
  -webkit-backdrop-filter:saturate(180%) blur(14px);
  border:1px solid var(--border); border-radius:var(--r-card);
  padding:12px 18px; margin-bottom:16px;
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  box-shadow:var(--shadow-card);
}
.ux-topbar-left{display:flex;align-items:center;gap:11px;min-width:0}
.ux-topright{display:flex;gap:12px;align-items:center;flex-shrink:0}
.ux-layout{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
.ux-left{display:flex;flex-direction:column;gap:14px;position:sticky;top:62px}
.ux-right{display:flex;flex-direction:column;gap:14px;min-width:0}
@media(max-width:980px){.ux-layout{grid-template-columns:1fr}.ux-left{position:static}}

.stat-pill{
  display:flex;align-items:center;gap:10px;
  padding:5px 12px 5px 8px;
  border:1px solid var(--border); border-radius:var(--r-pill);
  background:var(--surface); font-size:12px; color:var(--ink-3);
}
.stat-ring{width:18px;height:18px}
.stat-ring circle{fill:none;stroke-width:3}
.stat-ring .track{stroke:var(--border)}
.stat-ring .prog{stroke:var(--ink); stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dashoffset .5s ease}
.stat-pill strong{color:var(--ink);font-weight:600}

/* EP list */
.ep-scroll{overflow-y:auto;max-height:320px;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.ep-scroll::-webkit-scrollbar{width:6px}.ep-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.ep-item{display:flex;align-items:center;gap:11px;padding:12px 16px 12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background var(--t-fast);position:relative}
.ep-item:last-child{border-bottom:none}
.ep-item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ink);border-radius:0 2px 2px 0;opacity:0;transition:opacity var(--t-norm)}
.ep-item:hover{background:var(--surface-2)}
.ep-item.active{background:var(--surface-3)}
.ep-item.active::before{opacity:1}
.ep-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.6),0 0 0 3px rgba(17,17,16,.04)}
.ep-info{flex:1;min-width:0}
.ep-num{font-size:10px;font-weight:500;color:var(--ink-4);margin-bottom:2px;letter-spacing:.08em;text-transform:uppercase}
.ep-title-txt{font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.005em}
.ep-hook-txt{font-size:11px;color:var(--ink-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.ep-prog-wrap{margin-top:7px;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.ep-prog-fill{height:100%;background:linear-gradient(90deg,#1a1a18,#3d3d3a);border-radius:3px;transition:width .6s ease}
.ep-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r-pill);flex-shrink:0;letter-spacing:.01em}
.ep-del{position:absolute;right:46px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;color:var(--ink-3);display:none;align-items:center;justify-content:center;transition:all var(--t-fast)}
.ep-item:hover .ep-del{display:flex}
.ep-del:hover{background:#fef2f2;border-color:#fca5a5;color:#991b1b}

.add-row{padding:11px 14px;border-top:1px solid var(--border);display:flex;gap:7px;background:var(--surface-2)}
.add-input{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12.5px;font-family:inherit;outline:none;color:var(--ink);background:var(--surface);transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.add-input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(17,17,16,.06)}

.planner-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.pstat{padding:16px 8px;text-align:center;border-right:1px solid var(--border);background:linear-gradient(180deg,var(--surface),var(--surface-2))}
.pstat:last-child{border-right:none}
.pstat-num{font-size:24px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:5px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.pstat-lbl{font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:.04em;text-transform:uppercase}

.upload-section{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.upload-lbl{font-size:10px;font-weight:600;color:var(--ink-3);margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase}
.upload-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.upload-row + .upload-row{border-top:1px dashed var(--border)}
.up-icon{width:22px;height:22px;border-radius:6px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.up-label{font-size:12.5px;color:var(--ink-2);flex:1;font-weight:500}
.up-stepper{display:flex;align-items:center;gap:8px}
.upcount-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;color:var(--ink-3);display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;transition:all var(--t-fast)}
.upcount-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.up-count{font-size:13px;font-weight:600;color:var(--ink);min-width:18px;text-align:center;font-variant-numeric:tabular-nums}

.todo-list{display:flex;flex-direction:column}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background var(--t-fast)}
.todo-item:last-child{border-bottom:none}
.todo-item:hover{background:var(--surface-2)}
.todo-check{width:18px;height:18px;border-radius:6px;border:1.5px solid var(--ink-4);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all var(--t-fast);cursor:pointer;color:transparent;font-family:inherit;background:var(--surface)}
.todo-check:hover{border-color:var(--ink-3)}
.todo-check.done{background:var(--ink);border-color:var(--ink);color:#fff}
.todo-text{flex:1;font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.35}
.todo-text.done{color:var(--ink-4);text-decoration:line-through}
.todo-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-pill);flex-shrink:0;letter-spacing:.01em}
.todo-date{font-size:10px;color:var(--ink-4);flex-shrink:0;font-weight:500}
.del-btn{width:22px;height:22px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--ink-4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t-fast);font-family:inherit}
.del-btn:hover{color:#991b1b;background:#fef2f2}

.det-head{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;background:linear-gradient(180deg,var(--surface),var(--surface-2))}
.det-dot-wrap{width:36px;height:36px;border-radius:10px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.det-info{flex:1;min-width:0}
.det-epnum{font-size:10px;font-weight:600;color:var(--ink-3);margin-bottom:3px;letter-spacing:.08em;text-transform:uppercase}
.det-title{font-size:18px;font-weight:600;color:var(--ink);line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.015em}
.det-hook{font-size:12.5px;color:var(--ink-3);margin-top:3px}
.det-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.det-status{font-size:11px;color:var(--ink-3);font-weight:500;display:inline-flex;align-items:center;gap:6px}
.det-status::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ink-4)}
.det-status.running::before{background:#d97706;animation:pulse 1.2s ease-in-out infinite}
.det-status.done::before{background:#2d6a4f}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.out-row{display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid var(--border);transition:background var(--t-fast);position:relative}
.out-row:last-child{border-bottom:none}
.out-row.ready{cursor:pointer}
.out-row.ready:hover{background:var(--surface-2)}
.out-ico-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all var(--t-norm);border:1px solid transparent}
.out-row.ready .out-ico-wrap{background:linear-gradient(140deg,#1a1a18,#2c2c29);color:#fff;box-shadow:0 2px 6px rgba(17,17,16,.14),inset 0 1px 0 rgba(255,255,255,.06)}
.out-row:not(.ready) .out-ico-wrap{background:var(--surface-3);border-color:var(--border)}
.out-row:not(.ready) .out-ico-wrap > span{filter:grayscale(1);opacity:.35}
.out-name{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:2px;letter-spacing:-.005em}
.out-desc{font-size:11.5px;color:var(--ink-3)}
.out-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.out-status{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:var(--r-pill);letter-spacing:.02em}
.out-status.ready{background:var(--ok-bg);color:var(--ok-fg)}
.out-status.waiting{background:var(--surface-3);color:var(--ink-4)}

.tab-chip{font-size:11px;font-weight:500;padding:5px 11px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink-2);transition:all var(--t-fast);white-space:nowrap;font-family:inherit}
.tab-chip:hover{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 2px 6px rgba(17,17,16,.16)}

.archive-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-head{display:grid;grid-template-columns:28px 1fr 50px 50px 50px 50px 50px 60px;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.tbl-col{font-size:10px;font-weight:600;color:var(--ink-3);text-align:center;letter-spacing:.06em;text-transform:uppercase}
.tbl-col.left{text-align:left}
.tbl-col-ico{font-size:14px;color:var(--ink-3);text-align:center;opacity:.55}
.arc-row-wrap{border-bottom:1px solid var(--border)}
.arc-row-wrap:last-child{border-bottom:none}
.arc-row{display:grid;grid-template-columns:28px 1fr 50px 50px 50px 50px 50px 60px;align-items:center;padding:12px 20px;cursor:pointer;transition:background var(--t-fast)}
.arc-row:hover{background:var(--surface-2)}
.arc-arrow{font-size:9px;color:var(--ink-4);transition:transform var(--t-norm);text-align:center}
.arc-arrow.open{transform:rotate(90deg)}
.arc-ep-info{display:flex;align-items:center;gap:10px;min-width:0}
.arc-expand{background:var(--surface-2);border-top:1px solid var(--border);animation:expandIn var(--t-slow)}
@keyframes expandIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.arc-expand-bar{padding:12px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.arc-out-row{display:flex;align-items:center;gap:14px;padding:11px 24px 11px 56px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--t-fast)}
.arc-out-row:last-child{border-bottom:none}
.arc-out-row:hover{background:var(--surface)}
.arc-out-ico{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,#1a1a18,#2c2c29);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:0 2px 6px rgba(17,17,16,.14),inset 0 1px 0 rgba(255,255,255,.06)}

.empty{padding:48px 20px;text-align:center}
.empty-mark{width:48px;height:48px;border-radius:14px;background:var(--surface-3);display:inline-flex;align-items:center;justify-content:center;font-size:22px;opacity:.5;margin-bottom:12px}
.empty-title{font-size:13px;color:var(--ink-3);font-weight:500}
.empty-sub{font-size:11px;color:var(--ink-4);margin-top:4px}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-flex}

/* ── Modal (shared by UX agent) ──────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(17,17,16,.42);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;align-items:flex-start;justify-content:center;padding:48px 20px;overflow-y:auto;opacity:0;transition:opacity var(--t-norm)}
.overlay.open{display:flex;opacity:1}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:720px;margin:auto;box-shadow:var(--shadow-pop);overflow:hidden;border:1px solid var(--border);animation:modalIn .26s cubic-bezier(.2,.6,.2,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-head{padding:26px 28px 0}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:14px}
.modal-left{display:flex;align-items:center;gap:14px;min-width:0}
.modal-ico-w{width:48px;height:48px;border-radius:13px;background:linear-gradient(140deg,#1a1a18,#2c2c29);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 10px rgba(17,17,16,.18),inset 0 1px 0 rgba(255,255,255,.06)}
.modal-eyebrow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.modal-eyebrow-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.modal-eyebrow-txt{font-size:10.5px;font-weight:600;color:var(--ink-3);letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:380px}
.modal-title{font-size:22px;font-weight:700;color:var(--ink);line-height:1.2;letter-spacing:-.02em}
.close-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex-shrink:0;font-family:inherit;transition:all var(--t-fast)}
.close-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.modal-tabs-row{display:flex;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:0}
.mtab{font-size:13px;font-weight:500;padding:11px 16px;cursor:pointer;border:none;background:none;color:var(--ink-3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--t-fast);font-family:inherit;white-space:nowrap;letter-spacing:-.005em}
.mtab:hover{color:var(--ink)}
.mtab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}
.modal-body{padding:24px 28px 8px}
.use-note{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:18px;font-size:12.5px;color:var(--ink-3);line-height:1.65;display:flex;gap:11px;align-items:flex-start}
.use-note-mark{width:22px;height:22px;border-radius:7px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:600}
.use-note strong{color:var(--ink);font-weight:600}
.prompt-box{background:linear-gradient(160deg,#1a1a18,#0e0e0d);border-radius:13px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 6px 20px -8px rgba(17,17,16,.45),inset 0 1px 0 rgba(255,255,255,.04)}
.prompt-box::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 80% at 0% 0%,rgba(255,255,255,.04),transparent 60%)}
.prompt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative}
.prompt-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.48);letter-spacing:.1em;text-transform:uppercase}
.prompt-traffic{display:flex;gap:5px}
.prompt-traffic span{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.12)}
.prompt-txt{font-size:12.5px;color:rgba(255,255,255,.86);line-height:1.7;word-break:break-all;white-space:pre-wrap;position:relative;font-family:'DM Sans',monospace}
.modal-foot{padding:16px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);gap:12px}
.modal-foot-hint{font-size:12px;color:var(--ink-3)}
.modal-foot-actions{display:flex;gap:8px}
.refresh-item{display:flex;align-items:center;gap:13px;padding:13px 15px;border:1.5px solid var(--border);border-radius:11px;cursor:pointer;transition:all var(--t-fast);background:var(--surface)}
.refresh-item:hover{border-color:var(--border-strong);background:var(--surface-2)}
.refresh-item.sel{border-color:var(--ink);background:var(--surface-3);box-shadow:0 0 0 3px rgba(17,17,16,.05)}
.rcheck{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--ink-4);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all var(--t-fast);color:transparent}
.refresh-item.sel .rcheck{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── Responsive ──────────────────────────────────────── */
@media(max-width:768px){
  :root{--sb-w:64px}
  .ws-info,.ws-email,.sb-search input,.sb-search kbd,.sb-section-head span,.sb-mini,.sb-item-label,.sb-item-cnt,.sb-foot-btn{display:none}
  .sb-item{justify-content:center;padding:8px}
  .sb-item-emoji{font-size:18px}
  .ws-header{padding:10px;justify-content:center}
  .ws-avatar{margin:0 auto}
  .sb-search{justify-content:center;padding:8px}
  .schedule-row{grid-template-columns:1fr}
  .home-grid{grid-template-columns:1fr}
  .widget-span2{grid-column:span 1}
  .home-stats{grid-template-columns:repeat(2,1fr)}
  .view{padding:24px 20px 60px}
  .bg-row{grid-template-columns:60px 70px 1fr 60px;gap:8px}
  .bg-row-cat,.bg-row-memo{display:none}
  .ppl-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>



<!-- ────────── SIDEBAR ────────── -->
<aside class="sidebar" id="sidebar">
  <div class="ws-header">
    <div class="ws-avatar">유</div>
    <div class="ws-info">
      <div class="ws-name">유정의 워크스페이스</div>
      <div class="ws-email">Private</div>
    </div>
    <button class="sb-icobtn" title="설정">
      <svg viewBox="0 0 24 24" class="ico14"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>

  <div class="sb-search">
    <svg viewBox="0 0 24 24" class="ico14"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input id="sb-search-input" placeholder="검색">
    <kbd>⌘K</kbd>
  </div>

  <nav class="sb-nav" id="sb-nav">
    <!-- populated by JS -->
  </nav>

  <div class="sb-section">
    <div class="sb-section-head">
      <span>워크스페이스</span>
      <button class="sb-icobtn" title="추가" disabled="">
        <svg viewBox="0 0 24 24" class="ico14"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>
    <div class="sb-secondary">
      <div class="sb-mini"><span class="sb-mini-dot" style="background:#cc9900"></span>업무</div>
      <div class="sb-mini"><span class="sb-mini-dot" style="background:#226622"></span>개인</div>
      <div class="sb-mini"><span class="sb-mini-dot" style="background:#664499"></span>아카이브</div>
    </div>
  </div>

  <div class="sb-foot">
    <button class="sb-foot-btn">
      <svg viewBox="0 0 24 24" class="ico14"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      도움말
    </button>
    <button class="sb-foot-btn">
      <svg viewBox="0 0 24 24" class="ico14"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      업데이트
    </button>
  </div>
</aside>

<!-- ────────── MAIN ────────── -->
<main class="main" id="main">
  <!-- Crumb bar -->
  <div class="crumb" id="crumb">
    <div class="crumb-left">
      <button class="crumb-toggle" id="sb-toggle" title="사이드바">
        <svg viewBox="0 0 24 24" class="ico14"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      </button>
      <span class="crumb-trail" id="crumb-trail">홈</span>
    </div>
    <div class="crumb-right" id="crumb-right">
      <span class="crumb-meta" id="crumb-meta"></span>
    </div>
  </div>

  <!-- View container -->
  <div class="view-host" id="view-host">

    <!-- ─── HOME ─── -->
    <section class="view view-budget" data-view="budget" hidden="">
      <header class="page-head">
        <div class="page-emoji">💰</div>
        <h1 class="page-title">가계부</h1>
        <div class="page-sub">두 사람의 수입과 지출을 함께 기록해요</div>
      </header>

      <div class="ppl-tabs-row">
        <div class="ppl-tabs" id="ppl-tabs">
          <!-- populated by Budget: 전체 / Person A / Person B -->
        </div>
        <button class="btn btn-sm" onclick="Budget.openPplEdit()">
          <svg viewBox="0 0 24 24" class="ico14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          이름 수정
        </button>
      </div>

      <div class="ppl-cards" id="ppl-cards">
        <!-- per-person mini summary cards -->
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-head-left">
            <div class="card-mark">📊</div>
            <div><div class="card-title">지출</div><div class="card-sub" id="bg-tbl-sub">월별 카테고리 지출 — 사람을 선택하면 셀을 직접 입력할 수 있어요</div></div>
          </div>
          <div class="card-actions">
            <button class="btn btn-sm" onclick="Budget.prevYear()" title="이전 연도">
              <svg viewBox="0 0 24 24" class="ico14"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="bg-year" id="bg-year">2026년</div>
            <button class="btn btn-sm" onclick="Budget.nextYear()" title="다음 연도">
              <svg viewBox="0 0 24 24" class="ico14"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
          </div>
        </div>
        <div class="bg-tbl-wrap" id="bg-tbl-wrap"></div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-head-left">
            <div class="card-mark">📈</div>
            <div><div class="card-title">투자 현황</div><div class="card-sub" id="bg-inv-sub">월별 잔액을 기입하면 그래프가 자동으로 그려져요</div></div>
          </div>
          <div class="card-actions">
            <div class="seg" id="inv-mode">
              <button class="seg-btn on" data-mode="line" onclick="Budget.setInvMode('line')">라인</button>
              <button class="seg-btn" data-mode="stack" onclick="Budget.setInvMode('stack')">누적</button>
            </div>
          </div>
        </div>
        <div class="bg-inv-chart" id="bg-inv-chart"></div>
        <div class="bg-tbl-wrap" id="bg-inv-tbl-wrap"></div>
      </div>

      <!-- ── 월별 메모 / 특이사항 ── -->
      <div class="card" style="margin-top:18px">
        <div class="card-head">
          <div class="card-head-left">
            <div class="card-ico">📝</div>
            <div><div class="card-title">메모 / 특이사항</div><div class="card-sub" id="bg-memo-sub">선택한 월의 비고·결제예정·특이사항을 기록하세요</div></div>
          </div>
          <div class="card-actions">
            <select id="bg-memo-month" onchange="Budget.loadMemo()" class="btn btn-sm" style="cursor:pointer">
              <option value="2025-01">1월</option><option value="2025-02">2월</option>
              <option value="2025-03">3월</option><option value="2025-04">4월</option>
              <option value="2025-05">5월</option><option value="2025-06">6월</option>
              <option value="2025-07">7월</option><option value="2025-08">8월</option>
              <option value="2025-09">9월</option><option value="2025-10">10월</option>
              <option value="2025-11">11월</option><option value="2025-12">12월</option>
            </select>
          </div>
        </div>
        <textarea id="bg-memo-text" oninput="Budget.saveMemo()" placeholder="예) 가스비: 4월 미납분 합산 / 관리비: ARS 인증 필요해 카드결제 대체 ..." style="width:100%;min-height:140px;border:1px solid var(--line);border-radius:10px;padding:14px;font:14px/1.7 inherit;background:var(--bg-soft,#fafaf7);color:var(--ink);resize:vertical;box-sizing:border-box"></textarea>
      </div>
    </section>

    <!-- ─── SCHEDULE ─── -->
    

  </div>
</main>

<!-- ────────── 가계부 사람 편집 모달 ────────── -->
<div class="overlay" id="ppl-edit-ov">
  <div class="modal" style="max-width:480px">
    <div class="modal-head">
      <div class="modal-top">
        <div class="modal-left">
          <div class="modal-ico-w">👥</div>
          <div>
            <div class="modal-eyebrow"><div class="modal-eyebrow-txt">BUDGET SETTINGS</div></div>
            <div class="modal-title">가계부 사람 수정</div>
          </div>
        </div>
        <button class="close-btn" onclick="Budget.closePplEdit()" aria-label="닫기">
          <svg viewBox="0 0 24 24" class="ico14"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
        </button>
      </div>
    </div>
    <div class="modal-body" style="padding-top:8px">
      <div id="ppl-edit-fields" style="display:flex;flex-direction:column;gap:18px"></div>
    </div>
    <div class="modal-foot">

<script>
/* ═══════════════════════════════════════════════════
   유정 워크스페이스 — Shell (nav + storage utils) + Home widgets
   ═══════════════════════════════════════════════════ */

// ── Storage utilities (shared) ──────────────────────────
const LS = {
  get(key, fallback){
    try{ const v=localStorage.getItem(key); return v!==null?JSON.parse(v):fallback; }
    catch(e){ return fallback; }
  },
  set(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }
};
window.LS = LS;

// ── Format helpers ──────────────────────────────────────
const fmt = {
  won(n){ return (n||0).toLocaleString('ko-KR'); },
  date(d){
    if(typeof d==='string') d = new Date(d);
    const wk=['일','월','화','수','목','금','토'];
    return `${d.getMonth()+1}월 ${d.getDate()}일 (${wk[d.getDay()]})`;
  },
  ymd(d){
    if(typeof d==='string') return d.slice(0,10);
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  },
  ym(d){
    if(typeof d==='string') return d.slice(0,7);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  },
  rel(d){
    const t = new Date(d), now=new Date();
    const ms = now - t;
    const day = 24*60*60*1000;
    if(ms < day && t.getDate()===now.getDate()) return '오늘';
    if(ms < 2*day) return '어제';
    if(ms < 7*day) return Math.floor(ms/day)+'일 전';
    return fmt.date(t);
  }
};
window.fmt = fmt;

// ── Pub/sub for cross-module events ─────────────────────
const Bus = (()=>{
  const subs = {};
  return {
    on(ev, fn){ (subs[ev]=subs[ev]||[]).push(fn); },
    emit(ev, ...args){ (subs[ev]||[]).forEach(fn=>{ try{fn(...args);}catch(e){console.error(e);} }); }
  };
})();
window.Bus = Bus;

// ══════════════════════════════════════════════════════
// Workspace shell
// ══════════════════════════════════════════════════════
const Workspace = (()=>{
  const MENUS = [
    {id:'budget',   emoji:'💰', label:'가계부',       crumb:'기록 / 가계부'},
  ];

  let current = 'budget';

  function init(){
    renderNav();
    document.getElementById('sb-toggle').addEventListener('click', ()=>{
      document.body.classList.toggle('sb-collapsed');
    });
    window.addEventListener('hashchange', route);
    // ⌘K focus search
    document.addEventListener('keydown', e=>{
      if((e.metaKey||e.ctrlKey) && e.key==='k'){
        e.preventDefault();
        document.getElementById('sb-search-input').focus();
      }
    });
  }

  function renderNav(){
    const counts = getCounts();
    const nav = document.getElementById('sb-nav');
    nav.innerHTML = MENUS.map(m=>`
      <button class="sb-item${m.id===current?' active':''}" data-id="${m.id}" onclick="Workspace.go('${m.id}')">
        <span class="sb-item-emoji">${m.emoji}</span>
        <span class="sb-item-label">${m.label}</span>
        ${counts[m.id]!=null?`<span class="sb-item-cnt">${counts[m.id]}</span>`:''}
      </button>
    `).join('');
  }

  function getCounts(){
    const ux = LS.get('ux_state', []);
    const done = ux.filter(e=>e&&e.steps===7).length;
    const inProg = ux.filter(e=>e&&e.steps>0&&e.steps<7).length;

    const bgAmt = LS.get('workspace.budget.amounts', {});
    const ymStr = fmt.ym(new Date());
    const monthBucket = bgAmt[ymStr] || {};
    let bgCellCount = 0;
    Object.values(monthBucket).forEach(pm => {
      bgCellCount += Object.keys(pm||{}).length;
    });

    const sc = LS.get('workspace.schedule.events', []);
    const today = fmt.ymd(new Date());
    const todaySc = sc.filter(e=>e.date===today).length;

    const bk = LS.get('workspace.bucket.items', []);
    const bkOpen = bk.filter(i=>!i.done).length;

    return {
      ux: inProg>0?`${inProg}진행`:(done>0?`${done}완성`:null),
      budget: bgCellCount||null,
      schedule: todaySc||null,
      bucket: bkOpen||null,
    };
  }

  function go(id){
    if(id===current) return;
    current = id;
    location.hash = '#'+id;
    show(id);
    renderNav();
  }

  function route(){
    const h = (location.hash||'').replace('#','') || 'budget';
    const valid = MENUS.find(m=>m.id===h);
    current = valid ? h : 'budget';
    show(current);
    renderNav();
  }

  function show(id){
    document.querySelectorAll('.view').forEach(v=>{
      v.hidden = (v.dataset.view !== id);
    });
    const m = MENUS.find(x=>x.id===id);
    const trail = m.crumb.split(' / ');
    document.getElementById('crumb-trail').innerHTML =
      trail.map((t,i)=>i===trail.length-1?`<span class="here">${t}</span>`:`<span>${t}</span>`).join('<span class="sep">/</span>');
    // refresh that view's data
    if(id==='budget') Budget && Budget.render();
    window.scrollTo({top:0, behavior:'instant'});
  }

  return { init, go, route, renderNav, MENUS };
})();
window.Workspace = Workspace;
Bus.on('data-changed', ()=> Workspace.renderNav());

// ══════════════════════════════════════════════════════
// HOME — Widget dashboard
// ══════════════════════════════════════════════════════
const Home = (()=>{
  function init(){
    document.querySelectorAll('.hstat').forEach(el=>{
      el.addEventListener('click', ()=> Workspace.go(el.dataset.go));

  function greet(){
    const h = new Date().getHours();
    if(h<6) return '늦은 밤이에요';
    if(h<11) return '좋은 아침이에요';
    if(h<14) return '점심은 드셨나요';
    if(h<18) return '오후도 잘 보내요';
    if(h<22) return '저녁이 왔어요';

  function render(){
    const now = new Date();
    document.getElementById('home-greet').textContent = `${greet()}, 유정님`;
    document.getElementById('home-sub').textContent = fmt.date(now) + ' · 오늘의 워크스페이스';

    // ── Stats row ──
    const ux = LS.get('ux_state', []);

    const uxDone = ux.filter(e=>e&&e.steps===7).length;
    const uxInProg = ux.filter(e=>e&&e.steps>0&&e.steps<7).length;

    const bgAmt = LS.get('workspace.budget.amounts', {});
    const sections = LS.get('workspace.budget.sections', []);
    const ymStr = fmt.ym(now);
    const monthBucket = bgAmt[ymStr] || {};
    const monthOut = Object.values(monthBucket).reduce((s, pm)=>{
      return s + Object.values(pm||{}).reduce((a,b)=>a+b,0);
    }, 0);

    const sc = LS.get('workspace.schedule.events', []);
    const today = fmt.ymd(now);
    const todaySc = sc.filter(e=>e.date===today);

    const bk = LS.get('workspace.bucket.items', []);

  function widgetSchedule(sc, today){

    const tagName = {work:'업무',personal:'개인',health:'건강',event:'이벤트'};
    return `
    <div class="widget">
      <div class="widget-head">
        <div class="widget-title"><div class="widget-emoji">📅</div><div class="widget-name">다가오는 일정</div></div>
        <button class="widget-go" data-go="schedule">전체 보기 →</button>
      </div>

        ${upcoming.length? upcoming.map(e=>`
          <div class="wrow">

            <span class="wrow-title">${escapeHtml(e.title)}</span>
            <span class="wrow-tag" style="background:var(--surface-3);color:var(--ink-3)">${tagName[e.tag]||''}</span>
            <span class="wrow-meta">${e.date===today?'오늘':fmt.date(e.date)}</span>

  function widgetBudget(){

    const ymStr = fmt.ym(now);
    const amounts = LS.get('workspace.budget.amounts', {});

    const monthBucket = amounts[ymStr] || {};
    const per = people.map(p=>{
      const pm = monthBucket[p.id] || {};
      const out = Object.values(pm).reduce((a,b)=>a+b,0);
      return {...p, out};
    });
    const outTotal = per.reduce((a,p)=>a+p.out,0);
    const splitBar = outTotal>0
      ? per.map(p=>`<span style="width:${(p.out/outTotal*100).toFixed(1)}%;background:${p.color}"></span>`).join('')
      : '';
    return `
    <div class="widget">

              <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${p.color}"></div>
              <div style="font-size:10.5px;font-weight:600;color:var(--ink-3);letter-spacing:.04em;margin-bottom:4px">${escapeHtml(p.name)}</div>
              <div style="font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums">${fmt.won(p.out)}원</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  function widgetBucket(bk){
    const recent = bk.slice(0,4);
    const catEmoji = {travel:'✈️',career:'💼',learn:'📚',life:'🌿',health:'💪'};

      <div class="widget-body">
        ${recent.length? recent.map(i=>`
          <div class="w-bk-row">
            <span class="w-bk-check${i.done?' done':''}">${i.done?'✓':''}</span>
            <span class="w-bk-name${i.done?' done':''}">${escapeHtml(i.title)}</span>
            <span class="w-bk-cat">${catEmoji[i.cat]||'🌿'}</span>
          </div>`).join('') : `<div class="widget-empty">버킷을 추가해보세요</div>`}
      </div>

  function widgetUX(topics, state){
    const done = state.filter(e=>e&&e.steps===7).length;
    const inProg = state.filter(e=>e&&e.steps>0&&e.steps<7).length;
    const waiting = topics.length - done - inProg;
    return `

        </div>
        <div style="font-size:11px;color:var(--ink-3);line-height:1.6">
          시리즈 <strong style="color:var(--ink);font-weight:600">스크린으로 읽는 UX</strong><br>
          ${topics.length}편 중 ${done}편 완성 · 진행률 <strong style="color:var(--ink);font-weight:600">${topics.length?Math.round(done/topics.length*100):0}%</strong>
        </div>
      </div>
    </div>`;
  }

  function widgetQuick(){
    return `
    <div class="widget widget-span2">
      <div class="widget-head">
        <div class="widget-title"><div class="widget-emoji">⚡</div><div class="widget-name">빠른 추가</div></div>
      </div>
      <div class="widget-body">

          <button class="w-quick" data-quick="schedule">
            <span class="w-quick-emoji">📌</span>
            <span><div class="w-quick-lbl">일정 추가</div><div class="w-quick-sub">새로운 약속</div></span>
          </button>
          <button class="w-quick" data-quick="bucket">
            <span class="w-quick-emoji">🎯</span>
            <span><div class="w-quick-lbl">버킷 추가</div><div class="w-quick-sub">이루고 싶은 것</div></span>
          </button>
        </div>
      </div>
    </div>`;
  }

  return { init, render };
})();
window.Home = Home;

// ── tiny escape helper ──────────────────────────────────
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
window.escapeHtml = escapeHtml;

<script>
/* ═══════════════════════════════════════════════════

  // 사용자가 직접 만진 셀 기록 (이 셀은 시드로 덮어쓰지 않음)
  const KEY_AMT_TOUCHED = 'workspace.budget.amounts.touched';
  const KEY_INV_TOUCHED = 'workspace.budget.invest.touched';
  const KEY_MEMO = 'workspace.budget.memo';
  const SEED_MEMO = { '2025-05': "[5월 비고]\n· 하나카드 73,150원: 5/11 결제예정 (토스 Visa카드 — 클로드·아마존·네이버 구독)\n· 가스비: 4월 미납분 14,000 + 5월분 4만원 합산. 가스앱 설치 후 BC카드 결제\n· 관리비: 계좌이체에 ARS 인증 필요 → 카드결제로 대체\n· 전세자금대출/식권비/교통카드: 결제예정\n· 대출이자 366,205 + 원금 100만원\n· 어버이날 용돈 30,000 (부모님께)", '2025-06': "[6월 비고]\n· 하나카드(해외결제용): 클로드 291,143(max+api), 픽셀랩, 아마존, 네이버클라우드(취업 후 해지예정), 노벨피아, 미용실\n· BC카드: 보험료, 도시가스(지난달 결제), 오쥬드, 핸드폰 등\n· 7월 예정 비싼 지출: 클로드맥스 $110, 회식비 234,000, 오쥬드 145,000, AWS $145+@" };
  // 카테고리(섹션) 버전: 코드에서 카테고리를 바꾸면 이 숫자를 올리세요.
  // 저장된 버전보다 코드 버전이 높으면 코드의 defaultSections로 갱신됩니다.

  // deep-merge: base(시드) 위에 over(사용자값)를 덮어씀
  function mergeYmMap(seed, user, touched){
    const out = {};
