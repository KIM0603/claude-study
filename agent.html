        const merged = {...sCells};
        // 사용자값은 항상 우선 (직접 입력/0으로 지운 것 포함)
        Object.keys(uCells).forEach(k=>{ merged[k] = uCells[k]; });
        // 사용자가 0으로 지운(삭제) 셀도 touched에 기록돼 있으면 0 유지
        out[ym][pid] = merged;
      });
    });
    return out;
  }

  function defaultSections(){
    let k = 0;
    const mk = (label, ratio) => ({key:'k'+(++k), label, ratio});
    return [
      {key:'s0', label:'💵 수입', noExpense:true, items:[
        mk('월급', 0),
      ]},
      {key:'s1', label:'고정비 (자동이체)', items:[
        mk('전기세', 2),
        mk('가스비', 4),
        mk('관리비', 2),
        mk('도시가스', 4),
        mk('핸드폰', 1),
        mk('보험료', 4),
        mk('건강보험료', 7),
        mk('교통카드', 2),
        mk('식권비', 2),
      ]},
      {key:'s2', label:'대출 / 상환', items:[
        mk('전세자금대출', 6),
        mk('대출이자', 9),
        mk('대출원금', 24),
      ]},
      {key:'s3', label:'구독 / 서비스', items:[
        mk('클로드 (Claude)', 0),
        mk('픽셀랩', 0),
        mk('아마존', 0),
        mk('네이버 클라우드 (해지예정)', 0),
        mk('노벨피아', 0),
        mk('AWS Cloud', 0),
      ]},
      {key:'s4', label:'생활 / 미용 / 기타', items:[
        mk('미용실', 0),
        mk('오쥬드', 0),
        mk('어버이날 용돈', 0),
      ]},
      {key:'s5', label:'카드값 합계 (참고용)', noExpense:true, items:[
        mk('BC카드 합계', 0),
        mk('하나카드 합계', 0),
      ]},
    ];
  }

  function defaultInvestCats(){
    let k = 0;
    const mk = (label, color) => ({key:'iv'+(++k), label, color});
    return [
      mk('커플통장',  '#cc5500'),
      mk('투자 (대기중)',  '#0055cc'),
      mk('채권',  '#226622'),
    ];
  }

  let people = LS.get(KEY_PPL, [
    {id:0, name:'본인', color:'#cc5500'},
  ]);
  let sections = (function(){
    const storedVer = LS.get(KEY_SEC_VER, 0);
    const stored = LS.get(KEY_SEC, null);
    if(stored && storedVer >= SECTIONS_VERSION) return stored; // 사용자 편집 유지
    LS.set(KEY_SEC_VER, SECTIONS_VERSION);
    LS.set(KEY_SEC, defaultSections());
    return defaultSections(); // 코드 카테고리로 갱신
  })();
  let amounts  = mergeYmMap(SEED_AMOUNTS, LS.get(KEY_AMT, {}), LS.get(KEY_AMT_TOUCHED, {}));
  let filter   = LS.get(KEY_FILTER, 'all');
  let year     = LS.get(KEY_YEAR, 2025);
  let editing  = null;
  let investCats = (function(){
    const storedVer = LS.get(KEY_SEC_VER+'.inv', 0);
    const stored = LS.get(KEY_INV_CAT, null);
    if(stored && storedVer >= SECTIONS_VERSION) return stored;
    LS.set(KEY_SEC_VER+'.inv', SECTIONS_VERSION);
    LS.set(KEY_INV_CAT, defaultInvestCats());
    return defaultInvestCats();
  })();
  let investAmts = mergeYmMap(SEED_INVEST, LS.get(KEY_INV, {}), LS.get(KEY_INV_TOUCHED, {}));
  // 사용자 직접 입력분(시드와 별개로 저장) + 만진 셀 기록
  let userAmounts = LS.get(KEY_AMT, {});
  let userInvest  = LS.get(KEY_INV, {});
  let touchedAmt  = LS.get(KEY_AMT_TOUCHED, {});
  let touchedInv  = LS.get(KEY_INV_TOUCHED, {});
  function _mark(store, ym, pid, key){ (((store[ym]=store[ym]||{})[pid]=store[ym][pid]||{}))[key]=1; }
  function _setUser(store, ym, pid, key, val){
    if(!store[ym]) store[ym]={};
    if(!store[ym][pid]) store[ym][pid]={};
    store[ym][pid][key]=val; // 0도 저장(=사용자가 지움)
  }
  let investMode = LS.get(KEY_INV_MODE, 'line');
  let _maxInvKey = 0;
  investCats.forEach(c=>{
    if(c.key){ const n=Number((c.key+'').replace(/\D/g,''))||0; if(n>_maxInvKey)_maxInvKey=n; }
  });
  function nextInvKey(){ return 'iv'+(++_maxInvKey); }

  // migrate: ensure stable keys
  let _maxKey = 0;
  sections.forEach(s=>{
    if(s.key){ const n=Number((s.key+'').replace(/\D/g,''))||0; if(n>_maxKey)_maxKey=n; }
    s.items.forEach(it=>{
      if(it.key){ const n=Number((it.key+'').replace(/\D/g,''))||0; if(n>_maxKey)_maxKey=n; }
    });
  });
  let _dirtyKeys = false;
  sections.forEach((s,si)=>{
    if(!s.key){ s.key='s'+(++_maxKey); _dirtyKeys=true; }
    s.items.forEach(it=>{
      if(!it.key){ it.key='k'+(++_maxKey); _dirtyKeys=true; }
    });
  });
  function nextKey(prefix){ return prefix+(++_maxKey); }

  // ── persistence ──
  function save(){
    LS.set(KEY_AMT, userAmounts);   // 사용자 입력분만 저장 (시드는 코드 관리)
    LS.set(KEY_AMT_TOUCHED, touchedAmt);
    LS.set(KEY_SEC, sections);
    LS.set(KEY_PPL, people);
    LS.set(KEY_FILTER, filter);
    LS.set(KEY_YEAR, year);
    LS.set(KEY_INV_CAT, investCats);
    LS.set(KEY_INV, userInvest);    // 사용자 입력분만 저장
    LS.set(KEY_INV_TOUCHED, touchedInv);
    LS.set(KEY_INV_MODE, investMode);
    Bus.emit('data-changed');
  }

  // ── accessors ──
  function ym(year, monthIndex){ return `${year}-${String(monthIndex+1).padStart(2,'0')}`; }

  function getCellAmount(ym, key){
    const m = amounts[ym]; if(!m) return 0;
    if(filter==='all'){
      return people.reduce((s,p)=> s + ((m[p.id]||{})[key]||0), 0);
    }
    return ((m[Number(filter)]||{})[key]||0);
  }

  function setCellAmount(ym, key, val){
    if(filter==='all') return; // disabled in 'all' mode
    const pid = Number(filter);
    if(!amounts[ym]) amounts[ym] = {};
    if(!amounts[ym][pid]) amounts[ym][pid] = {};
    if(val>0) amounts[ym][pid][key] = val;
    else delete amounts[ym][pid][key];
    // 사용자 입력분 별도 기록 (시드보다 우선)
    _setUser(userAmounts, ym, pid, key, val>0?val:0);
    _mark(touchedAmt, ym, pid, key);
    save();
  }

  function getMonthTotal(ymStr){
    let t = 0;
    sections.forEach(s=>{ if(s.noExpense) return; s.items.forEach(it=>{ t += getCellAmount(ymStr, it.key); }); });
    return t;
  }
  function getMonthIncome(ymStr){
    let t = 0;
    sections.forEach(s=>{ if(!s.noExpense || s.key!=='s0') return; s.items.forEach(it=>{ t += getCellAmount(ymStr, it.key); }); });
    return t;
  }
  function getItemYearTotal(key){
    let t = 0;
    for(let i=0;i<12;i++) t += getCellAmount(ym(year,i), key);
    return t;
  }
  function getYearTotal(){
    let t = 0;
    for(let i=0;i<12;i++) t += getMonthTotal(ym(year,i));
    return t;
  }
  function getPersonMonthTotal(pid){
    const cm = fmt.ym(new Date());
    const m = amounts[cm]; if(!m) return 0;
    const pm = m[pid] || {};
    return Object.values(pm).reduce((a,b)=>a+b,0);
  }
  function getAllMonthTotalCurrent(){
    return people.reduce((s,p)=>s+getPersonMonthTotal(p.id), 0);
  }

  // ── init ──
  function init(){
    if(_dirtyKeys) save();
    const ov = document.getElementById('ppl-edit-ov');
    if(ov) ov.addEventListener('click', e=>{ if(e.target===e.currentTarget) closePplEdit(); });
    document.addEventListener('keydown', e=>{
      if(e.key==='Escape'){
        const ovOpen = document.getElementById('ppl-edit-ov').classList.contains('open');
        if(ovOpen){ closePplEdit(); return; }
        if(editing){ editing = null; render(); }
      }
    });
    render();
  }

  // ── render: orchestrator ──
  function render(){
    renderTabs();
    renderPersonCards();
    renderTable();
    renderInvest();
    // 메모: 월 선택 기본값을 최신 데이터(6월)로, 그리고 로드
    (function(){
      const sel = document.getElementById('bg-memo-month');
      if(sel && !sel.dataset.inited){
        sel.dataset.inited = '1';
        sel.value = '2025-06';
      }
      loadMemo();
    })();
    document.getElementById('bg-year').textContent = `${year}년`;
    document.getElementById('bg-tbl-sub').textContent = (filter==='all')
      ? '월별 카테고리 지출 — 셀을 입력하려면 위 탭에서 사람을 선택하세요'
      : `월별 카테고리 지출 — ${people.find(p=>p.id===Number(filter))?.name||''} 입력 모드 (셀 클릭 → 입력)`;
    const invSub = document.getElementById('bg-inv-sub');
    if(invSub) invSub.textContent = (filter==='all')
      ? '월별 잔액 — 두 사람 합산 보기 (사람을 선택하면 셀 입력 가능)'
      : `월별 잔액 — ${people.find(p=>p.id===Number(filter))?.name||''} 입력 모드`;
  }

  // ── tabs ──
  function renderTabs(){
    const el = document.getElementById('ppl-tabs');
    if(!el) return;
    const tabs = [{id:'all', label:'전체', dot:null}, ...people.map(p=>({id:p.id, label:p.name, dot:p.color}))];
    el.innerHTML = tabs.map(t=>{
      const active = String(t.id)===String(filter);
      return `<button class="ppl-tab${active?' on':''}" onclick="Budget.filter('${t.id}')">
        ${t.dot?`<span class="ppl-tab-dot" style="background:${t.dot}"></span>`:''}
        <span>${escapeHtml(t.label)}</span>
      </button>`;
    }).join('');
  }

  function setFilter(f){ filter=f; editing=null; save(); render(); }
  function prevYear(){ year--; editing=null; save(); render(); }
  function nextYear(){ year++; editing=null; save(); render(); }

  // ── person cards ──
  function renderPersonCards(){
    const el = document.getElementById('ppl-cards');
    if(!el) return;
    const totalAll = getAllMonthTotalCurrent();
    el.innerHTML = people.map(p=>{
      const my = getPersonMonthTotal(p.id);
      const share = totalAll>0 ? Math.round(my/totalAll*100) : 0;
      return `<div class="ppl-card" style="--p-color:${p.color}">
        <div class="ppl-card-head">
          <div class="ppl-card-name">
            <span class="ppl-tab-dot" style="background:${p.color}"></span>
            <span>${escapeHtml(p.name)}</span>
          </div>
          <div class="ppl-card-share">이번 달 ${share}%</div>
        </div>
        <div class="ppl-card-rows">
          <div class="ppl-card-row">
            <span class="ppl-card-row-lbl">이번 달 지출</span>
            <span class="ppl-card-row-num out">${fmt.won(my)}원</span>
          </div>
          <div class="ppl-card-row">
            <span class="ppl-card-row-lbl">올해 누계</span>
            <span class="ppl-card-row-num">${fmt.won(getPersonYearTotal(p.id))}원</span>
          </div>
        </div>
        <div class="ppl-card-bar"><span style="width:${share}%;background:${p.color}"></span></div>
      </div>`;
    }).join('');
  }

  function getPersonYearTotal(pid){
    let t = 0;
    for(let i=0;i<12;i++){
      const m = amounts[ym(year,i)];
      if(!m) continue;
      const pm = m[pid] || {};
      t += Object.values(pm).reduce((a,b)=>a+b,0);
    }
    return t;
  }

  // ── spending table ──
  function renderTable(){
    const host = document.getElementById('bg-tbl-wrap');
    if(!host) return;
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const nowYm = fmt.ym(new Date());
    const monthCols = months.map((m,i)=> ym(year,i));
    const editable = filter !== 'all';
    const totalCols = 2 + 12 + 1; // label + ratio + 12 months + year total

    let html = '<table class="bg-tbl"><thead><tr>';
    html += `<th class="col-label">지출</th>`;
    html += `<th>비율</th>`;
    months.forEach((mLabel, i)=>{
      const ymStr = ym(year,i);
      const cls = ymStr===nowYm ? ' this-month' : '';
      html += `<th class="${cls.trim()}">${mLabel}</th>`;
    });
    html += `<th>합계</th>`;
    html += '</tr></thead><tbody>';

    sections.forEach((sec, si)=>{
      const isEditingSec = editing && editing.kind==='section' && editing.skey===sec.key;
      // section header row
      html += `<tr class="bg-tbl-sec">
        <td class="col-label" colspan="${totalCols}">
          <div class="sec-label-cell">
            ${isEditingSec
              ? `<input class="sec-label-input" type="text" value="${escapeHtml(sec.label)}" onblur="Budget.commitSection('${sec.key}', this.value)" onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape'){Budget._cancel();}" />`
              : `<span class="sec-label-text">[${escapeHtml(sec.label)}]</span>`
            }
            <span class="sec-label-actions">
              <button class="cat-act-btn" onclick="Budget.addItem('${sec.key}')" title="항목 추가">＋ 항목</button>
              <button class="cat-act-btn" onclick="Budget.startSection('${sec.key}')" title="섹션 이름 수정">
                <svg viewBox="0 0 24 24" class="ico14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="cat-act-btn danger" onclick="Budget.deleteSection('${sec.key}')" title="섹션 삭제">✕</button>
            </span>
          </div>
        </td>
      </tr>`;

      sec.items.forEach((it, ii)=>{
        const isEditingLabel = editing && editing.kind==='label' && editing.key===it.key;
        html += `<tr class="bg-tbl-item" data-key="${it.key}">`;
        html += `<td class="col-label">
          <div class="cat-label-cell">
            ${isEditingLabel
              ? `<input class="cat-label-input" type="text" value="${escapeHtml(it.label)}" onblur="Budget.commitLabel('${it.key}', this.value)" onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape'){Budget._cancel();}" />`
              : `<span class="cat-label-text">${escapeHtml(it.label)}</span>`
            }
            <span class="cat-label-actions">
              <button class="cat-act-btn" onclick="Budget.startLabel('${it.key}')" title="이름 수정">
                <svg viewBox="0 0 24 24" class="ico14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="cat-act-btn danger" onclick="Budget.deleteItem('${it.key}')" title="삭제">✕</button>
            </span>
          </div>
        </td>`;
        // ratio
        const isEditingRatio = editing && editing.kind==='ratio' && editing.key===it.key;
        if(isEditingRatio){
          html += `<td class="bg-tbl-ratio editing"><input type="number" min="0" max="100" value="${it.ratio}" onblur="Budget.commitRatio('${it.key}', this.value)" onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape'){Budget._cancel();}" /></td>`;
        } else {
          html += `<td class="bg-tbl-ratio editable" onclick="Budget.startRatio('${it.key}')">${it.ratio}%</td>`;
        }
        // monthly cells
        monthCols.forEach((ymStr)=>{
          const amt = getCellAmount(ymStr, it.key);
          const isEditing = editing && editing.kind==='amt' && editing.ym===ymStr && editing.key===it.key;
          const thisMonth = ymStr===nowYm ? ' this-month' : '';
          if(isEditing){
            html += `<td class="bg-tbl-amt editing${thisMonth}"><input type="number" min="0" value="${amt||''}" placeholder="0" onblur="Budget.commitAmt('${ymStr}','${it.key}',this.value)" onkeydown="Budget._cellKey(event,'${ymStr}','${it.key}')" /></td>`;
          } else if(!editable){
            html += `<td class="bg-tbl-amt locked${thisMonth}${amt===0?' empty':''}">${amt? fmt.won(amt) : '-'}</td>`;
          } else {
            html += `<td class="bg-tbl-amt${thisMonth}${amt===0?' empty':''}" onclick="Budget.startAmt('${ymStr}','${it.key}')">${amt? fmt.won(amt) : '-'}</td>`;
          }
        });
        html += `<td class="bg-tbl-amt locked${getItemYearTotal(it.key)===0?' empty':''}">${getItemYearTotal(it.key)? fmt.won(getItemYearTotal(it.key)) : '-'}</td>`;
        html += `</tr>`;
      });
    });

    // "+ section" row
    html += `<tr class="bg-tbl-add-sec"><td class="col-label" colspan="${totalCols}">
      <button class="btn-add-section" onclick="Budget.addSection()">
        <svg viewBox="0 0 24 24" class="ico14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        섹션 추가
      </button>
    </td></tr>`;

    // total row
    html += `<tr class="bg-tbl-total">`;
    html += `<td class="col-label">합계</td>`;
    const totalRatio = sections.reduce((a,s)=> s.noExpense ? a : a+s.items.reduce((b,i)=>b+i.ratio,0),0);
    html += `<td class="bg-tbl-ratio">${totalRatio}%</td>`;
    monthCols.forEach((ymStr)=>{
      const t = getMonthTotal(ymStr);
      const cls = ymStr===nowYm ? ' this-month' : '';
      html += `<td class="bg-tbl-amt locked${cls}${t===0?' empty':''}">${t? fmt.won(t) : '-'}</td>`;
    });
    const yearT = getYearTotal();
    html += `<td class="bg-tbl-amt locked${yearT===0?' empty':''}">${yearT? fmt.won(yearT) : '-'}</td>`;
    html += `</tr></tbody></table>`;

    host.innerHTML = html;

    if(editing){
      const inp = host.querySelector('.editing input, .cat-label-input, .sec-label-input');
      if(inp){ inp.focus(); inp.select(); }
    }
  }

  // ── label & structure edits ──
  function startLabel(key){ editing={kind:'label', key}; renderTable(); }
  function commitLabel(key, val){
    const v = (val||'').trim();
    sections.forEach(s=>s.items.forEach(it=>{ if(it.key===key) it.label = v || it.label; }));
    save(); editing=null; render();
  }
  function startSection(skey){ editing={kind:'section', skey}; renderTable(); }
  function commitSection(skey, val){
    const v = (val||'').trim();
    sections.forEach(s=>{ if(s.key===skey) s.label = v || s.label; });
    save(); editing=null; render();
  }
  function addItem(skey){
    const s = sections.find(x=>x.key===skey);
    if(!s) return;
    const newItem = {key: nextKey('k'), label:'새 항목', ratio:0};
    s.items.push(newItem);
    save();
    editing={kind:'label', key:newItem.key};
    render();
  }
  function deleteItem(key){
    let label='';
    sections.forEach(s=>s.items.forEach(it=>{ if(it.key===key) label=it.label; }));
    if(!confirm(`"${label}" 항목을 삭제할까요?\n(입력했던 금액도 함께 사라집니다)`)) return;
    sections.forEach(s=>{ s.items = s.items.filter(it=>it.key!==key); });
    // also remove from amounts
    Object.values(amounts).forEach(monthBucket=>{
      Object.values(monthBucket).forEach(pm=>{ delete pm[key]; });
    });
    save(); render();
  }
  function addSection(){
    const newSec = {key: nextKey('s'), label:'새 섹션', items:[]};
    sections.push(newSec);
    save();
    editing={kind:'section', skey:newSec.key};
    render();
  }
  function deleteSection(skey){
    const s = sections.find(x=>x.key===skey);
    if(!s) return;
    if(!confirm(`"[${s.label}]" 섹션과 ${s.items.length}개 항목을 모두 삭제할까요?`)) return;
    const keys = s.items.map(it=>it.key);
    sections = sections.filter(x=>x.key!==skey);
    Object.values(amounts).forEach(monthBucket=>{
      Object.values(monthBucket).forEach(pm=>{
        keys.forEach(k=>delete pm[k]);
      });
    });
    save(); render();
  }

  // ── cell editing ──
  function startAmt(ymStr, key){
    if(filter==='all') return;
    editing = { kind:'amt', ym:ymStr, key };
    renderTable();
  }
  function commitAmt(ymStr, key, val){
    const n = Number(val) || 0;
    setCellAmount(ymStr, key, n);
    editing = null;
    render();
  }
  function startRatio(key){
    editing = { kind:'ratio', key };
    renderTable();
  }
  function commitRatio(key, val){
    let n = Math.max(0, Math.min(100, Number(val)||0));
    sections.forEach(s=>s.items.forEach(it=>{ if(it.key===key) it.ratio = n; }));
    save();
    editing = null;
    render();
  }
  function _cancel(){
    editing = null;
    render();
  }
  // tab between cells on Enter / arrow keys
  function _cellKey(e, ymStr, key){
    if(e.key==='Enter'){ e.target.blur(); }
    else if(e.key==='Escape'){ e.preventDefault(); _cancel(); }
    else if(e.key==='Tab'){
      e.preventDefault();
      const all = [];
      sections.forEach(s=>s.items.forEach(it=>{ for(let i=0;i<12;i++) all.push({ym:ym(year,i), key:it.key}); }));
      const idx = all.findIndex(c=>c.ym===ymStr && c.key===key);
      const next = all[idx + (e.shiftKey?-1:1)];
      if(next){
        // commit current then open next
        commitAmt(ymStr, key, e.target.value);
        setTimeout(()=>{ startAmt(next.ym, next.key); }, 0);
      } else {
        e.target.blur();
      }
    }
  }

  // ── 투자 (Investment) ──
  function setInvMode(m){
    investMode = m;
    save();
    document.querySelectorAll('#inv-mode .seg-btn').forEach(b=>{
      b.classList.toggle('on', b.dataset.mode===m);
    });
    renderInvest();
  }

  function getInvAmt(ymStr, key){
    const m = investAmts[ymStr]; if(!m) return 0;
    if(filter==='all'){
      return people.reduce((s,p)=> s + ((m[p.id]||{})[key]||0), 0);
    }
    return ((m[Number(filter)]||{})[key]||0);
  }
  function setInvAmt(ymStr, key, val){
    if(filter==='all') return;
    const pid = Number(filter);
    if(!investAmts[ymStr]) investAmts[ymStr] = {};
    if(!investAmts[ymStr][pid]) investAmts[ymStr][pid] = {};
    if(val>0) investAmts[ymStr][pid][key] = val;
    else delete investAmts[ymStr][pid][key];
    _setUser(userInvest, ymStr, pid, key, val>0?val:0);
    _mark(touchedInv, ymStr, pid, key);
    save();
  }
  function getInvCatYearTotal(key){
    let t=0; for(let i=0;i<12;i++) t += getInvAmt(ym(year,i), key); return t;
  }
  function getInvMonthTotal(ymStr){
    let t=0; investCats.forEach(c=>{ t += getInvAmt(ymStr, c.key); }); return t;
  }

  function renderInvest(){
    renderInvestChart();
    renderInvestTable();
  }

  function renderInvestChart(){
    const host = document.getElementById('bg-inv-chart');
    if(!host) return;
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const monthCols = months.map((_,i)=> ym(year,i));
    const nowYm = fmt.ym(new Date());

    // collect per-cat per-month values
    const data = investCats.map(c=>({
      cat:c,
      values: monthCols.map(ymStr=>getInvAmt(ymStr, c.key))
    }));
    const totals = monthCols.map(ymStr=>getInvMonthTotal(ymStr));
    const peak = Math.max(1, ...totals, ...data.flatMap(d=>d.values));
    const hasData = totals.some(v=>v>0);

    if(!hasData){
      host.innerHTML = `<div class="bg-inv-empty">아래 표에 잔액을 입력하면 그래프가 나타납니다</div>`;
      return;
    }

    // chart geometry
    const W = 880, H = 220, padL = 56, padR = 16, padT = 12, padB = 28;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    const xs = monthCols.map((_,i)=> padL + (innerW * (i/11)));
    const y = v => padT + innerH - (innerH * (v/peak));

    // y-axis ticks
    const tickCount = 4;
    const tickVals = Array.from({length:tickCount+1}, (_,i)=> Math.round(peak * i/tickCount));
    const ticks = tickVals.map(v=>{
      return `<g><line x1="${padL}" x2="${W-padR}" y1="${y(v)}" y2="${y(v)}"/><text x="${padL-8}" y="${y(v)+3}" text-anchor="end">${formatShort(v)}</text></g>`;
    }).join('');

    // x-axis labels
    const xLabels = months.map((m,i)=>{
      const cls = monthCols[i]===nowYm ? 'this-month' : '';
      return `<text x="${xs[i]}" y="${H-padB+16}" text-anchor="middle" class="${cls}">${m}</text>`;
    }).join('');

    // series rendering
    let series = '';
    let tooltipAnchors = '';
    if(investMode==='stack'){
      // stacked area
      const stacks = []; // per category: array of [x, yBottom, yTop]
      const running = new Array(12).fill(0);
      data.forEach(d=>{
        const tops = d.values.map((v,i)=>{
          const bot = running[i];
          const top = bot + v;
          return {bot, top, v};
        });
        d.values.forEach((v,i)=>{ running[i] += v; });
        stacks.push({cat:d.cat, tops});
      });
      stacks.forEach(s=>{
        const topPath = s.tops.map((p,i)=> `${i===0?'M':'L'} ${xs[i]} ${y(p.top)}`).join(' ');
        const botPath = s.tops.slice().reverse().map((p,i)=> `L ${xs[11-i]} ${y(p.bot)}`).join(' ');
        series += `<path d="${topPath} ${botPath} Z" fill="${s.cat.color}" class="bg-inv-area"/>`;
        series += `<path d="${topPath}" stroke="${s.cat.color}" class="bg-inv-line"/>`;
      });
      // dots on top line
      const topLine = stacks[stacks.length-1] ? stacks[stacks.length-1].tops : [];
      topLine.forEach((p,i)=>{
        if(p.top>0) series += `<circle cx="${xs[i]}" cy="${y(p.top)}" r="3.5" fill="${stacks[stacks.length-1].cat.color}" class="bg-inv-dot"/>`;
      });
      // tooltips anchored at total line
      topLine.forEach((p,i)=>{
        tooltipAnchors += `<rect x="${xs[i]-20}" y="${padT}" width="40" height="${innerH+padB}" fill="transparent" data-i="${i}" class="bg-inv-hot"/>`;
      });
    } else {
      // line per category + total
      data.forEach(d=>{
        const path = d.values.map((v,i)=> `${i===0?'M':'L'} ${xs[i]} ${y(v)}`).join(' ');
        series += `<path d="${path}" stroke="${d.cat.color}" class="bg-inv-line"/>`;
        d.values.forEach((v,i)=>{
          if(v>0) series += `<circle cx="${xs[i]}" cy="${y(v)}" r="3" fill="${d.cat.color}" class="bg-inv-dot"/>`;
        });
      });
      // total line in ink
      const tPath = totals.map((v,i)=> `${i===0?'M':'L'} ${xs[i]} ${y(v)}`).join(' ');
      series += `<path d="${tPath}" stroke="#111110" stroke-dasharray="4 3" class="bg-inv-line"/>`;
      monthCols.forEach((_,i)=>{
        tooltipAnchors += `<rect x="${xs[i]-20}" y="${padT}" width="40" height="${innerH+padB}" fill="transparent" data-i="${i}" class="bg-inv-hot"/>`;
      });
    }

    // legend
    const legendTotals = investCats.map(c=>({
      ...c,
      v: getInvAmt(nowYm, c.key)
    }));
    const legend = `<div class="bg-inv-legend">
      ${legendTotals.map(c=>`<span class="bg-inv-leg-item"><span class="bg-inv-leg-dot" style="background:${c.color}"></span>${escapeHtml(c.label)} <span class="bg-inv-leg-amt">${fmt.won(c.v)}원</span></span>`).join('')}
      <span class="bg-inv-leg-item" style="margin-left:auto"><span class="bg-inv-leg-dot" style="background:#111110"></span>이번 달 합계 <span class="bg-inv-leg-amt">${fmt.won(getInvMonthTotal(nowYm))}원</span></span>
    </div>`;

    host.innerHTML = `
      <svg class="bg-inv-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <g class="bg-inv-grid">${ticks}</g>
        ${series}
        <g class="bg-inv-axis">${xLabels}</g>
        <g class="bg-inv-hots">${tooltipAnchors}</g>
      </svg>
      <div class="bg-inv-tt" id="bg-inv-tt"></div>
      ${legend}
    `;

    // wire tooltips
    const svg = host.querySelector('svg');
    const tt = host.querySelector('#bg-inv-tt');
    const hots = host.querySelectorAll('.bg-inv-hot');
    hots.forEach(rect=>{
      rect.style.cursor = 'crosshair';
      rect.addEventListener('mouseenter', e=>{
        const i = Number(rect.dataset.i);
        const ymStr = monthCols[i];
        const total = getInvMonthTotal(ymStr);
        const lines = investCats.map(c=>{
          const v = getInvAmt(ymStr, c.key);
          return `<div class="bg-inv-tt-row"><span><span class="bg-inv-tt-dot" style="background:${c.color}"></span>${escapeHtml(c.label)}</span><strong>${fmt.won(v)}원</strong></div>`;
        }).join('');
        tt.innerHTML = `
          <div style="font-weight:600;margin-bottom:6px;color:rgba(255,255,255,.7);font-size:10px;letter-spacing:.06em;text-transform:uppercase">${months[i]}</div>
          ${lines}
          <div class="bg-inv-tt-row" style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.18)"><span>합계</span><strong>${fmt.won(total)}원</strong></div>
        `;
        // position
        const rectBox = rect.getBoundingClientRect();
        const hostBox = host.getBoundingClientRect();
        const cx = rectBox.left + rectBox.width/2 - hostBox.left;
        const cy = padT * (hostBox.height/H) + 6;
        tt.style.left = cx+'px';
        tt.style.top = cy+'px';
        tt.classList.add('on');
      });
      rect.addEventListener('mouseleave', ()=>{ tt.classList.remove('on'); });
    });
  }

  function formatShort(n){
    if(n>=10000000) return (n/10000000).toFixed(n>=100000000?0:1)+'천만';
    if(n>=10000) return (n/10000).toFixed(n>=100000?0:1)+'만';
    if(n>=1000) return (n/1000).toFixed(0)+'천';
    return String(n);
  }

  function renderInvestTable(){
    const host = document.getElementById('bg-inv-tbl-wrap');
    if(!host) return;
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const nowYm = fmt.ym(new Date());
    const monthCols = months.map((_,i)=> ym(year,i));
    const editable = filter !== 'all';
    const totalCols = 1 + 12 + 1;

    let html = '<table class="bg-tbl"><thead><tr>';
    html += `<th class="col-label">자산</th>`;
    months.forEach((mLabel, i)=>{
      const ymStr = ym(year,i);
      const cls = ymStr===nowYm ? ' this-month' : '';
      html += `<th class="${cls.trim()}">${mLabel}</th>`;
    });
    html += `<th>합계</th></tr></thead><tbody>`;

    investCats.forEach(c=>{
      const isEditingLabel = editing && editing.kind==='invlabel' && editing.key===c.key;
      html += `<tr class="bg-tbl-item" data-key="${c.key}">`;
      html += `<td class="col-label">
        <div class="cat-label-cell">
          <span class="ppl-tab-dot" style="background:${c.color};margin-right:4px"></span>
          ${isEditingLabel
            ? `<input class="cat-label-input" type="text" value="${escapeHtml(c.label)}" onblur="Budget.commitInvLabel('${c.key}', this.value)" onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape'){Budget._cancel();}" />`
            : `<span class="cat-label-text">${escapeHtml(c.label)}</span>`
          }
          <span class="cat-label-actions">
            <button class="cat-act-btn" onclick="Budget.startInvLabel('${c.key}')" title="이름 수정">
              <svg viewBox="0 0 24 24" class="ico14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="cat-act-btn" onclick="Budget.cycleInvColor('${c.key}')" title="색상 변경" style="color:${c.color}">●</button>
            <button class="cat-act-btn danger" onclick="Budget.deleteInvCat('${c.key}')" title="삭제">✕</button>
          </span>
        </div>
      </td>`;
      monthCols.forEach(ymStr=>{
        const amt = getInvAmt(ymStr, c.key);
        const isEditing = editing && editing.kind==='invamt' && editing.ym===ymStr && editing.key===c.key;
        const thisMonth = ymStr===nowYm ? ' this-month' : '';
        if(isEditing){
          html += `<td class="bg-tbl-amt editing${thisMonth}"><input type="number" min="0" value="${amt||''}" placeholder="0" onblur="Budget.commitInvAmt('${ymStr}','${c.key}',this.value)" onkeydown="Budget._invCellKey(event,'${ymStr}','${c.key}')" /></td>`;
        } else if(!editable){
          html += `<td class="bg-tbl-amt locked${thisMonth}${amt===0?' empty':''}">${amt? fmt.won(amt) : '-'}</td>`;
        } else {
          html += `<td class="bg-tbl-amt${thisMonth}${amt===0?' empty':''}" onclick="Budget.startInvAmt('${ymStr}','${c.key}')">${amt? fmt.won(amt) : '-'}</td>`;
        }
      });
      html += `<td class="bg-tbl-amt locked${getInvCatYearTotal(c.key)===0?' empty':''}">${getInvCatYearTotal(c.key)? fmt.won(getInvCatYearTotal(c.key)) : '-'}</td>`;
      html += `</tr>`;
    });

    // "+ 자산 추가" row
    html += `<tr class="bg-tbl-add-sec"><td class="col-label" colspan="${totalCols}">
      <button class="btn-add-section" onclick="Budget.addInvCat()">
        <svg viewBox="0 0 24 24" class="ico14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        자산 추가
      </button>
    </td></tr>`;

    // total row
    html += `<tr class="bg-tbl-total"><td class="col-label">합계</td>`;
    monthCols.forEach(ymStr=>{
      const t = getInvMonthTotal(ymStr);
      const cls = ymStr===nowYm ? ' this-month' : '';
      html += `<td class="bg-tbl-amt locked${cls}${t===0?' empty':''}">${t? fmt.won(t) : '-'}</td>`;
    });
    let yt=0; investCats.forEach(c=>{ yt += getInvCatYearTotal(c.key); });
    html += `<td class="bg-tbl-amt locked${yt===0?' empty':''}">${yt? fmt.won(yt) : '-'}</td>`;
    html += `</tr></tbody></table>`;

    host.innerHTML = html;
    if(editing && (editing.kind==='invamt' || editing.kind==='invlabel')){
      const inp = host.querySelector('.editing input, .cat-label-input');
      if(inp){ inp.focus(); inp.select(); }
    }
  }

  function startInvLabel(key){ editing={kind:'invlabel', key}; renderInvestTable(); }
  function commitInvLabel(key, val){
    const v = (val||'').trim();
    const c = investCats.find(x=>x.key===key);
    if(c){ c.label = v || c.label; save(); }
    editing=null; renderInvest();
  }
  function cycleInvColor(key){
    const PALETTE = ['#cc5500','#0055cc','#226622','#664499','#993356','#226666','#cc9900','#444444'];
    const c = investCats.find(x=>x.key===key);
    if(!c) return;
    const idx = PALETTE.indexOf(c.color);
    c.color = PALETTE[(idx+1) % PALETTE.length];
    save(); renderInvest();
  }
  function addInvCat(){
    const PALETTE = ['#cc5500','#0055cc','#226622','#664499','#993356','#226666','#cc9900','#444444'];
    const used = investCats.map(c=>c.color);
    const color = PALETTE.find(c=>!used.includes(c)) || PALETTE[investCats.length % PALETTE.length];
    const nc = {key: nextInvKey(), label:'새 자산', color};
    investCats.push(nc);
    save();
    editing={kind:'invlabel', key:nc.key};
    render();
  }
  function deleteInvCat(key){
    const c = investCats.find(x=>x.key===key);
    if(!c) return;
    if(!confirm(`"${c.label}" 자산 항목을 삭제할까요?\n(입력했던 잔액도 함께 사라집니다)`)) return;
    investCats = investCats.filter(x=>x.key!==key);
    Object.values(investAmts).forEach(mb=>{
      Object.values(mb).forEach(pm=>{ delete pm[key]; });
    });
    save(); render();
  }
  function startInvAmt(ymStr, key){
    if(filter==='all') return;
    editing={kind:'invamt', ym:ymStr, key};
    renderInvestTable();
  }
  function commitInvAmt(ymStr, key, val){
    const n = Number(val) || 0;
    setInvAmt(ymStr, key, n);
    editing=null; render();
  }
  function _invCellKey(e, ymStr, key){
    if(e.key==='Enter'){ e.target.blur(); }
    else if(e.key==='Escape'){ e.preventDefault(); editing=null; render(); }
    else if(e.key==='Tab'){
      e.preventDefault();
      const all = [];
      investCats.forEach(c=>{ for(let i=0;i<12;i++) all.push({ym:ym(year,i), key:c.key}); });
      const idx = all.findIndex(c=>c.ym===ymStr && c.key===key);
      const next = all[idx + (e.shiftKey?-1:1)];
      if(next){
        commitInvAmt(ymStr, key, e.target.value);
        setTimeout(()=>startInvAmt(next.ym, next.key), 0);
      } else {
        e.target.blur();
      }
    }
  }

    // ── 사람 편집 모달 ──
  const PALETTE = ['#cc5500','#0055cc','#226622','#664499','#993356','#226666','#cc9900','#444444'];
  let _editDraft = null;

  function openPplEdit(){
    _editDraft = {};
    people.forEach(p=>{ _editDraft[p.id] = {name:p.name, color:p.color}; });
    renderEditFields();
    document.getElementById('ppl-edit-ov').classList.add('open');
    setTimeout(()=>{
      const f = document.querySelector('.ppl-edit-name');
      if(f){ f.focus(); f.select(); }
    }, 100);
  }
  function closePplEdit(){
    _editDraft = null;
    document.getElementById('ppl-edit-ov').classList.remove('open');
  }
  function renderEditFields(){
    const el = document.getElementById('ppl-edit-fields');
    if(!el || !_editDraft) return;
    el.innerHTML = people.map(p=>{
      const d = _editDraft[p.id];
      return `<div class="ppl-edit-field">
        <div class="ppl-edit-field-head">사람 ${p.id+1}</div>
        <input type="text" class="ppl-edit-name" data-pid="${p.id}" value="${escapeHtml(d.name)}" placeholder="이름" />
        <div class="ppl-edit-swatches">
          ${PALETTE.map(c=>`<div class="ppl-edit-swatch${c===d.color?' on':''}" data-pid="${p.id}" data-c="${c}" style="background:${c}"></div>`).join('')}
        </div>
      </div>`;
    }).join('');
    el.querySelectorAll('.ppl-edit-swatch').forEach(sw=>{
      sw.addEventListener('click', ()=>{
        const pid = Number(sw.dataset.pid);
        _editDraft[pid].color = sw.dataset.c;
        renderEditFields();
      });
    });
    el.querySelectorAll('.ppl-edit-name').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        const pid = Number(inp.dataset.pid);
        _editDraft[pid].name = inp.value;
      });
      inp.addEventListener('keydown', e=>{
        if(e.key==='Enter'){ e.preventDefault(); savePplEdit(); }
      });
    });
  }
  function savePplEdit(){
    if(!_editDraft) return;
    people.forEach(p=>{
      const d = _editDraft[p.id]; if(!d) return;
      const v = (d.name||'').trim();
      p.name = v || `사람 ${p.id+1}`;
      p.color = d.color || p.color;
    });
    save();
    closePplEdit();
    render();
  }

  // ── 메모 / 특이사항 ──
  let memos = (function(){
    const user = LS.get(KEY_MEMO, {});
    const out = Object.assign({}, SEED_MEMO);
    Object.keys(user).forEach(k=>{ out[k] = user[k]; }); // 사용자 작성분 우선
    return out;
  })();
  function curMemoMonth(){
    const sel = document.getElementById('bg-memo-month');
    return sel ? sel.value : ('2025-' + String(new Date().getMonth()+1).padStart(2,'0'));
  }
  function loadMemo(){
    const ta = document.getElementById('bg-memo-text');
    if(ta) ta.value = memos[curMemoMonth()] || '';
  }
  function saveMemo(){
    const ta = document.getElementById('bg-memo-text');
    if(!ta) return;
    const m = curMemoMonth();
    memos[m] = ta.value;
    // 사용자 작성분만 저장 (시드와 달라진 것 + 새로 쓴 것)
    const userMemos = LS.get(KEY_MEMO, {});
    userMemos[m] = ta.value;
    LS.set(KEY_MEMO, userMemos);
  }

  return {
    init, render, filter:setFilter,
    loadMemo, saveMemo,
    prevYear, nextYear,
    startAmt, commitAmt, startRatio, commitRatio, _cancel, _cellKey,
    startLabel, commitLabel, startSection, commitSection,
    addItem, deleteItem, addSection, deleteSection,
    setInvMode,
    startInvLabel, commitInvLabel, cycleInvColor, addInvCat, deleteInvCat,
    startInvAmt, commitInvAmt, _invCellKey,
    openPplEdit, closePplEdit, savePplEdit,
  };
})();
window.Budget = Budget;

</script>
<script>
  // boot order: shell first, then home + ux + modules, then route
  Workspace.init();
  Budget.init();
  Workspace.route(); // honor hash / default to budget
</script>
